# Production Rust HTTP shell for SIPI (strangler-fig Phase C; ADR-0013).
#
# This is the `sipi` library crate (lib.rs — the axum+tokio server that
# statically links the C++ image engine via //src/ffi:sipi_ffi) plus a thin
# default binary (main.rs → sipi::run()). Resolved into `@crates_prod` by
# `crate.from_cargo` in MODULE.bazel — a separate manifest from the e2e suite's
# `@crates` (//test/e2e-rust). Bazel builds the first-party crate; Cargo only
# resolves the dependency graph into Cargo.lock.
#
# Repin via:  CARGO_BAZEL_REPIN=1 bazelisk fetch @crates_prod//:all
[package]
name = "sipi"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
name = "sipi"
path = "src/lib.rs"

[[bin]]
name = "sipi_server"
path = "src/main.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "timeout", "limit"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
clap = { version = "4", features = ["derive"] }
http = "1"
bytes = "1"
percent-encoding = "2"
