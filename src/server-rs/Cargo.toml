# Production Rust HTTP shell for SIPI — the `sipi` library (strangler-fig
# rewrite; ADR-0013).
#
# This is the `sipi` library crate (lib.rs — the axum+tokio server that
# statically links the C++ image engine via //src/ffi:sipi_ffi). The default
# `sipi` binary that wraps it lives in //src/cli-rs (decision #9). Both
# first-party manifests resolve into `@crates_prod` via `crate.from_cargo` in
# MODULE.bazel — a separate graph from the e2e suite's `@crates` (//test/e2e).
# Bazel builds the first-party crates; Cargo only resolves the dependency graph
# into Cargo.lock.
#
# Repin via:  CARGO_BAZEL_REPIN=1 bazelisk fetch @crates_prod//:all
[package]
name = "sipi"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
name = "sipi"
path = "src/lib.rs"

[dependencies]
# multipart: the configured Lua upload route reads server.uploads, so the shell
# parses multipart/form-data into temp files before driving sipi_run_lua_route.
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time", "signal"] }
tokio-stream = "0.1"
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
percent-encoding = "2"
form_urlencoded = "1"
serde_json = "1"
# Spool each multipart upload to a temp file the C++ engine opens by path; the
# handle is held until the Lua route finishes, then auto-deleted on drop.
tempfile = "3"

# Observability — the OpenTelemetry/OTLP stack, matching the dsp-repository
# Rust/axum precedent (gRPC-tonic → the Alloy collector on :4317). The helper
# crates own the hard parts: init-tracing-opentelemetry reads OTEL_* env and is
# fail-open (no-op export when OTEL_EXPORTER_OTLP_ENDPOINT is unset);
# axum-tracing-opentelemetry's OtelAxumLayer names spans by the route template
# (low cardinality) and continues the W3C traceparent. All otel crates move in
# lockstep — bump them together.
opentelemetry = { version = "0.31", features = ["metrics"] }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio", "metrics", "logs"] }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic", "trace", "metrics", "logs"] }
opentelemetry-appender-tracing = "0.31"
tracing-opentelemetry = "0.32"
axum-tracing-opentelemetry = "0.33"
init-tracing-opentelemetry = { version = "0.36", features = ["otlp", "metrics", "tracing_subscriber_ext"] }
