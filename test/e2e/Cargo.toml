[package]
name = "sipi-e2e"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "multipart", "rustls-tls"] }
serde_json = "1"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "tiff"] }
insta = { version = "1.47", features = ["json", "redactions"] }
nix = { version = "0.29", features = ["signal", "process"] }
# `rust_crypto` backend (pure-Rust). The default `aws_lc_rs` backend
# pulls `aws-lc-sys`, whose cmake-based build script panics inside
# Bazel actions ("rust_wrapper.h is not a directory"). `src/jwt.rs` and
# its consumers (`security.rs`, `differential.rs`) use HS256 (HMAC) — a
# symmetric algorithm where backend choice doesn't matter.
jsonwebtoken = { version = "10", default-features = false, features = ["rust_crypto"] }
base64 = "0.22"
proptest = "1"
rand = "0.9"

[features]
docker = []  # Enable Docker smoke tests (requires daschswiss/sipi:latest image)

[dev-dependencies]
tempfile = "3"
