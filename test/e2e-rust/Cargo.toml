[package]
name = "sipi-e2e"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
reqwest = { version = "0.12", features = ["blocking", "json", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "tiff"] }
insta = { version = "1.46", features = ["json", "redactions"] }
nix = { version = "0.29", features = ["signal", "process"] }
jsonwebtoken = "10"
base64 = "0.22"
proptest = "1"
rstest = "0.24"
rand = "0.9"

[features]
docker = []  # Enable Docker smoke tests (requires daschswiss/sipi:latest image)

[dev-dependencies]
tempfile = "3"
