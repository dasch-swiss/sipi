# Main CI workflow for pull requests and scheduled verification.
# Includes:
#   - Nix/Clang build + unit + e2e + Hurl + coverage + Docker image
#     build + smoke test + Docker Scout, on Linux amd64/arm64
#   - Nix static musl build (Zig-in-Nix) + Rust e2e on amd64/arm64
#   - Nix native macOS arm64 build + dylib-linkage audit on internal PRs
#   - mkdocs documentation build
#
# Every build step invokes `just <recipe>`. No inline cmake or nix build
# calls. Recipes live in the justfile; see the "Nix builds" section there.

name: ci

on:
  schedule:
    # run on midnight every day
    - cron: '0 0 * * *'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}
    name: test / ${{ matrix.arch }}
    permissions:
      contents: read
      pull-requests: write   # Docker Scout PR comment
      security-events: write # SARIF upload (amd64 only)
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.arch }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Enforce shttps→sipi boundary
        run: bash scripts/shttps-context-check.sh
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify vendor ==="
          ls -la vendor/*.tar.gz | head -3
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # Kakadu FOD in flake.nix uses gh release download via
          # impureEnvVars; daemon needs configurable-impure-env to accept
          # GH_TOKEN from the client (every `just nix-build*` recipe passes
          # the matching client flag).
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Skip on forked PRs — DOCKER_HUB_TOKEN is unavailable to forks and the
      # login would fail loudly. The smoke test consumes a locally loaded
      # image, so login is only useful for authenticated Docker Hub pulls
      # (rate-limit avoidance) on internal PRs and the nightly schedule.
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install --inputs-from . nixpkgs#just
      - name: Build and test (unit tests run in the Nix sandbox)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build
      - name: Rust e2e and Hurl tests
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # `nix-test-e2e` consumes the .#e2e-tests Nix derivation — no
        # cargo on PATH needed. `hurl-test` still shells out to `hurl`,
        # which we install onto PATH alongside `just`.
        run: |
          nix profile install --inputs-from . nixpkgs#hurl
          just nix-test-e2e
          just hurl-test
      - name: Gather code coverage
        if: ${{ matrix.arch == 'amd64' }}
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-coverage
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.arch == 'amd64' }}
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: dasch-swiss/sipi
          files: result-coverage/coverage.xml
      - name: Build Docker image (Nix dockerTools)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-docker-build-${{ matrix.arch }}
      - run: just nix-test-smoke
      - name: Docker Scout — compare to production
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss
      - name: Docker Scout — CVE report (SARIF)
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://daschswiss/sipi:latest
          sarif-file: scout-results.sarif
          only-severities: critical,high
          write-comment: false
          organization: daschswiss
      - name: Upload SARIF to GitHub Security
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

  # Zig-in-Nix musl-static validation. Exists in parallel to zig-static
  # until Part B.5 retires the latter (see plan glowing-rolling-fern).
  # Expect failures during Part B.1 ext/* patching.
  nix-static:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.runner }}
    name: nix-static / ${{ matrix.arch }}
    concurrency:
      group: ${{ github.workflow }}-nix-static-${{ matrix.arch }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # Kakadu FOD in flake.nix uses gh release download via
          # impureEnvVars; daemon needs configurable-impure-env to accept
          # GH_TOKEN from the client.
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix profile install --inputs-from . nixpkgs#just
      - name: Build static binary
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build-static-${{ matrix.arch }}
      - name: Verify static linkage
        # file / readelf are standard ubuntu runner tools.
        run: just nix-static-linkage-verify result/bin/sipi
      - name: Rust e2e tests against static binary
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          SIPI_BIN: ${{ github.workspace }}/result/bin/sipi
        # `nix-test-e2e` consumes the .#e2e-tests Nix derivation —
        # no cargo on PATH needed.
        run: just nix-test-e2e

  # Native Darwin build via Nix + clang/libc++, with a dylib-linkage audit.
  # Replaces the old zig-macos job; the invariant (no Homebrew / third-party
  # dylibs) is the same, just verified through the Nix toolchain instead of
  # Zig on macOS.
  nix-macos-audit:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-14
    name: nix-macos / arm64 dylib-audit
    concurrency:
      group: ${{ github.workflow }}-nix-macos-audit-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix profile install --inputs-from . nixpkgs#just
      - name: Build native Darwin binary
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build-default
      - name: Audit runtime dylibs
        # otool is part of macOS system toolchain.
        run: just nix-macos-dylib-audit result/bin/sipi

  # Build documentation. Pure Python/MkDocs — Nix is only here so we can
  # provision `just` consistently with the other jobs; no `nix build` runs,
  # so Cachix would have nothing to substitute.
  docs:
    name: docs
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-docs-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix profile install --inputs-from . nixpkgs#just
      - run: just docs-install-requirements
      - run: just docs-build
