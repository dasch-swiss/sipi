# Main CI workflow for pull requests.
#
# A fast `lint` gate runs first on a single linux-amd64 runner: the
# platform-independent checks — shttps→sipi boundary, differential-coverage
# drift guard, Rust formatting (`bazel-rustfmt-check`), and clippy
# (`bazel-clippy-check`, whose `undocumented_unsafe_blocks` lint is the fast
# unsafe check). The `test` matrix `needs:` it, so a formatting / clippy /
# boundary failure fails fast on one runner before the 3-arch build+test fleet
# spins up.
#
# Test matrix runs on all three supported platforms (linux-x86_64,
# linux-aarch64, darwin-aarch64) and executes `just bazel-test`
# (fastbuild, no instrumentation; unit + approval + e2e). Linux entries
# additionally build the Docker image, run the Bazel-built smoke test
# against it, and feed Docker Scout. amd64 uploads the SARIF CVE scan.
#
# Coverage instrumentation moved out of this workflow to
# `.github/workflows/coverage.yml`, which runs on every push to `main`
# (post-merge) on a single linux-amd64 runner and uploads lcov to
# Codecov. PRs no longer get a per-PR coverage delta in Codecov;
# trade-off accepted for faster PR CI.
#
# Every step invokes `just <recipe>`. No inline bazel calls — recipes are
# the contract surface. See the justfile "Bazel — what CI runs" section.
#
# Documentation builds run in a separate `docs` job (Python / mkdocs).

name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # Fast, platform-independent pre-gate. Runs once on linux-amd64; the `test`
  # matrix `needs:` it, so these checks fail fast on one runner before the
  # 3-arch fleet spins up. The two pure-shell checks run before the Nix
  # bootstrap so a trivial failure trips in seconds; the Rust gates then reuse
  # the RBE remote cache. No LFS pull — none of these checks read test images.
  lint:
    name: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-lint-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Enforce shttps→sipi boundary
        run: bash scripts/shttps-context-check.sh
      # Drift guard: the differential corpus must keep covering the e2e surface.
      # Pure shell (grep), so it runs before the Nix bootstrap and fails fast if
      # an e2e test was added/removed without updating the corpus.
      - name: Check differential coverage (drift guard)
        run: bash tools/differential_coverage_check.sh
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # See the `test` job: keep GH_TOKEN in `nix develop`'s environment so
          # the gh_release_archive Kakadu fetch can authenticate.
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"
      # cargo-machete is pure static analysis (parses each Cargo.toml + greps the
      # sources); it needs neither Bazel nor the RBE backend, so it runs before
      # the RBE setup and fails fast (seconds) on an unused dependency, ahead of
      # the slow clippy build.
      - name: Check for unused Rust dependencies
        run: nix develop --command bash -c "just machete"
      # Remote cache + mTLS + the GH_TOKEN-backed Kakadu fetch that analyzing the
      # Rust crate graph needs. Same composite action the `test` job uses; the
      # gate builds for linux-amd64 only.
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          cache-endpoint: ${{ vars.REMOTEBUILD_CACHE_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
          target-platform: "//platforms:linux_x86_64"
      - name: Check Rust formatting
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: nix develop --command bash -c "just bazel-rustfmt-check ${{ steps.rbe.outputs.flags }}"
      - name: Run clippy
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: nix develop --command bash -c "just bazel-clippy-check ${{ steps.rbe.outputs.flags }}"

  test:
    needs: lint
    runs-on: ${{ matrix.runs-on }}
    name: test / ${{ matrix.platform }}
    permissions:
      contents: read
      pull-requests: write   # Docker Scout PR comment
      security-events: write # SARIF upload (linux-amd64 only)
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.platform }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            arch: amd64
            runs-on: ubuntu-24.04
            bazel-platform: "//platforms:linux_x86_64"
          - platform: linux-arm64
            arch: arm64
            runs-on: ubuntu-24.04-arm
            bazel-platform: "//platforms:linux_aarch64"
          - platform: darwin-arm64
            arch: arm64
            runs-on: macos-14
            bazel-platform: "//platforms:darwin_aarch64"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false  # don't auto-pull LFS — use cache below
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # The `gh_release_archive` repository_rule reads GH_TOKEN from the
          # environment via `gh release download`; configurable-impure-env
          # keeps Nix's daemon from sanitising it out of `nix develop`.
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      # Magic Nix Cache uses GitHub Actions' built-in cache as the
      # binary-cache backend for `/nix/store`. Free, zero-config; shrinks
      # the cold-runner `nix develop` bootup from 30-70s to ~5-15s once
      # the per-branch cache key warms.
      #
      # Linux-only: on GitHub-hosted macOS runners the Nix daemon doesn't
      # list the runner user in `trusted-users`, so the magic-nix-cache
      # daemon refuses to enable the GHA cache backend. The cache-restore
      # steps then add overhead without benefit — see DEV-6565 for the
      # measured regression on darwin-arm64.
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        if: runner.os != 'macOS'
        with:
          # GHA cache backend only; skip the FlakeHub probe (paid product,
          # DaSCH org not enrolled). Without this, the action emits a
          # misleading `##[error]Unable to authenticate to FlakeHub`
          # annotation even though the GHA cache works fine.
          use-flakehub: "false"
      # Skip on forked PRs and on macOS runners — DOCKER_HUB_TOKEN is
      # unavailable to forks (and macOS doesn't run Docker steps anyway).
      # The smoke test consumes a locally loaded image, so login is only
      # useful for authenticated Docker Hub pulls (rate-limit avoidance)
      # on internal Linux PRs.
      - uses: docker/login-action@v4
        if: runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      # REMOTE BUILD EXECUTION:
      #
      # The self-hosted RBE backend (dasch-remotebuild-prod-01, defined in the
      # ops-tf + ops-infra repos) is the single Bazel
      # backend. It serves the Remote Cache + Remote Execution (the runner
      # endpoint, mTLS) and a bazel-remote download cache (the cache endpoint) for
      # http_archive (--experimental_remote_downloader). Both endpoints present a
      # cert signed by the same CA, so one --tls_certificate validates both — no
      # proxy, no CA bundle, no GCS.
      #
      # The `bazel-rbe` composite action writes the mTLS material (org secrets +
      # variables REMOTEBUILD_*) outside the checkout and emits the Bazel flag
      # string. Compiles fan out to the x86_64 worker — cross-compiling the
      # arm64/darwin legs — while tests run on the native runner
      # (--strategy=TestRunner=local). A down backend degrades to a local build
      # (--remote_local_fallback, the .bazelrc default). Fork PRs get empty flags
      # (no secrets) and build cold.
      #
      # Every Bazel invocation goes through `nix develop --command`, where the dev
      # shell provides `bazelisk` (reads `.bazelversion`) + `gh` (the
      # gh_release_archive repository_rule for the Kakadu fetch).
      #
      # Rust formatting + clippy are not here — they run once in the `lint` gate
      # that this job `needs:`.
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          cache-endpoint: ${{ vars.REMOTEBUILD_CACHE_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
          target-platform: ${{ matrix.bazel-platform }}

      - name: Build + run all tests
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: nix develop --command bash -c "just bazel-test ${{ steps.rbe.outputs.flags }}"

      # The differential parity gate (Rust shell vs the retained C++ oracle)
      # is `manual`-tagged, so the `just bazel-test` wildcard above and
      # `bazel-coverage` skip it — it needs its own explicit invocation, like
      # `docker_smoke`. Run on linux-amd64 only (mirroring the rustfmt gate):
      # Rust↔C++ divergences are code-level, not platform-specific, so one
      # platform catches them and keeps the per-PR cost of the heavy two-binary
      # spawn bounded.
      - name: Run differential parity gate (Rust shell vs C++ oracle)
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: nix develop --command bash -c "just bazel-test-differential ${{ steps.rbe.outputs.flags }}"

      # Docker steps run on Linux only because they `docker load` the image
      # into a local Linux Docker daemon (absent on the macOS runner) — not
      # because the image can't be built on macOS. //src:image is gated on the
      # target OS (`target_compatible_with = ["@platforms//os:linux"]`), which a
      # macOS host can satisfy with `--platforms=linux_*` (see
      # `just bazel-cross-build-image`). With no platform override the default
      # host platform on macOS is darwin, which fails that gate.
      #
      # `bazel-test-smoke` is one Bazel invocation that:
      #   1. Builds //src:image as a transitive `data` dep of
      #      //test/e2e:docker_smoke.
      #   2. Runs the smoke test, whose startup code does
      #      `docker load -i $SIPI_IMAGE_TAR` — the image lands in the
      #      local Docker daemon as `daschswiss/sipi:latest` (matching
      #      `oci_load.repo_tags`).
      #   3. Probes HTTP endpoints against the loaded container.
      #
      # Docker Scout reads `local://daschswiss/sipi:latest` left in the
      # daemon by step 2 — no separate build/load step needed.
      - name: Run Docker smoke tests (builds + loads image, then smoke-tests)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: nix develop --command bash -c "just bazel-test-smoke ${{ steps.rbe.outputs.flags }}"

      - name: Docker Scout — compare to production
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss

      - name: Docker Scout — CVE report (SARIF)
        if: runner.os == 'Linux' && github.event_name == 'pull_request' && matrix.platform == 'linux-amd64'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://daschswiss/sipi:latest
          sarif-file: scout-results.sarif
          only-severities: critical,high
          write-comment: false
          organization: daschswiss

      - name: Upload SARIF to GitHub Security
        if: runner.os == 'Linux' && github.event_name == 'pull_request' && matrix.platform == 'linux-amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

  # Build documentation. Pure Python/MkDocs — Nix is only here so we can
  # provision `just` consistently with the other jobs.
  docs:
    name: docs
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-docs-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          # GHA cache backend only; skip the FlakeHub probe (paid product,
          # DaSCH org not enrolled). Without this, the action emits a
          # misleading `##[error]Unable to authenticate to FlakeHub`
          # annotation even though the GHA cache works fine.
          use-flakehub: "false"
      - uses: extractions/setup-just@v3
      - run: just docs-install-requirements
      - run: just docs-build
