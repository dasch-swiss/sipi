# Main CI workflow for pull requests and scheduled verification.
# Includes:
#   - Nix/Clang build + unit + e2e + Hurl + coverage + Docker image
#     build + smoke test + Docker Scout, on Linux amd64/arm64
#   - Nix native macOS arm64 build + dylib-linkage audit on internal PRs
#   - mkdocs documentation build
#
# Every build step invokes `just <recipe>`. No inline cmake or nix build
# calls. Recipes live in the justfile; see the "Nix builds" section there.

name: ci

on:
  schedule:
    # run on midnight every day
    - cron: '0 0 * * *'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}
    name: test / ${{ matrix.arch }}
    permissions:
      contents: read
      pull-requests: write   # Docker Scout PR comment
      security-events: write # SARIF upload (amd64 only)
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.arch }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      # `just bazel-docker-build-${arch}` (run later in this job) builds
      # Kakadu from source via `rules_foreign_cc`. After `just nix-build`
      # has populated the Nix store with sipi's full closure, the runner
      # is tight on disk and Kakadu's foreign_cc make exits silently
      # mid-build with "output X was not created". The Bazel-build
      # workflow uses the same step for the same reason.
      - name: free disk space (linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Enforce shttpsâ†’sipi boundary
        run: bash scripts/shttps-context-check.sh
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify vendor ==="
          ls -la vendor/*.tar.gz | head -3
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # Kakadu FOD in flake.nix uses gh release download via
          # impureEnvVars; daemon needs configurable-impure-env to accept
          # GH_TOKEN from the client (every `just nix-build*` recipe passes
          # the matching client flag).
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Skip on forked PRs â€” DOCKER_HUB_TOKEN is unavailable to forks and the
      # login would fail loudly. The smoke test consumes a locally loaded
      # image, so login is only useful for authenticated Docker Hub pulls
      # (rate-limit avoidance) on internal PRs and the nightly schedule.
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install --inputs-from . nixpkgs#just
      - name: Build and test (unit tests run in the Nix sandbox)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build
      - name: Rust e2e and Hurl tests
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # `nix-test-e2e` consumes the .#e2e-tests Nix derivation â€” no
        # cargo on PATH needed. `hurl-test` still shells out to `hurl`,
        # which we install onto PATH alongside `just`.
        run: |
          nix profile install --inputs-from . nixpkgs#hurl
          just nix-test-e2e
          just hurl-test
      - name: Gather code coverage
        if: ${{ matrix.arch == 'amd64' }}
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-coverage
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.arch == 'amd64' }}
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: dasch-swiss/sipi
          files: result-coverage/coverage.xml
      # Disk-cache survives across CI runs and shaves ~5 min off Kakadu's
      # foreign_cc cold build (DEV-6371). Same key shape as sanitizer.yml /
      # bazel-build.yml but namespaced `ci-test-${arch}` so this job's
      # entries don't collide with the bazel-build / sanitizer caches.
      - uses: actions/cache@v5
        id: bazel-disk-cache
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-ci-test-${{ matrix.arch }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'ext/**/BUILD.bazel', 'bazel/**', 'patches/**', 'platforms/**', '.bazelrc', '.bazelversion', 'flake.lock') }}
          restore-keys: |
            bazel-disk-ci-test-${{ matrix.arch }}-
      - name: Build Docker image (Bazel rules_oci)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # `nix develop --command` activates the dev shell so bazelisk +
        # `gh` (kakadu_archive repository_rule) + foreign_cc host tools
        # (`cmake`, `perl`, `pkg-config`, `autoconf`, `automake`,
        # `libtoolize`) reach the build. Running bare
        # `just bazel-docker-build-${arch}` falls back to the runner's
        # pre-installed bazelisk + system tooling, which produces an
        # inconsistent foreign_cc compile env and surfaces as kakadu
        # output-extraction failures (sanitizer.yml carries the same
        # comment for `bazel-build-sanitized`).
        # `--disk_cache` matches `actions/cache@v5` step above.
        run: nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} --disk_cache=\$HOME/.cache/bazel-disk"
      # Smoke tests still consume the Nix-built `.#smoke-test` runner
      # until Y+5 (DEV-6347) ports them to `rules_rust`. The image
      # under test is the Bazel-built one loaded by the step above.
      - run: just nix-test-smoke
      - name: Docker Scout â€” compare to production
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss
      - name: Docker Scout â€” CVE report (SARIF)
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://daschswiss/sipi:latest
          sarif-file: scout-results.sarif
          only-severities: critical,high
          write-comment: false
          organization: daschswiss
      - name: Upload SARIF to GitHub Security
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

  # Native Darwin build via Nix + clang/libc++. Sole CI gate for the
  # Darwin build-completeness invariant â€” confirms `flake.nix` still
  # evaluates and `.#default` builds on macOS arm64.
  nix-macos-build:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-14
    name: nix-macos / arm64 build
    concurrency:
      group: ${{ github.workflow }}-nix-macos-build-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix profile install --inputs-from . nixpkgs#just
      - name: Build native Darwin binary
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build-default

  # Build documentation. Pure Python/MkDocs â€” Nix is only here so we can
  # provision `just` consistently with the other jobs; no `nix build` runs,
  # so Cachix would have nothing to substitute.
  docs:
    name: docs
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-docs-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix profile install --inputs-from . nixpkgs#just
      - run: just docs-install-requirements
      - run: just docs-build
