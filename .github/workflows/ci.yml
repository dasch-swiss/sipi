# Main CI workflow for pull requests and scheduled verification.
#
# Test matrix runs on all three supported platforms (linux-x86_64,
# linux-aarch64, darwin-aarch64). Every platform runs the full test suite
# under coverage instrumentation via `just bazel-coverage` (unit + approval
# + e2e). Linux entries additionally build the Docker image, run the
# Bazel-built smoke test against it, and feed Docker Scout. amd64 uploads
# the Codecov lcov report and the SARIF CVE scan.
#
# Every step invokes `just <recipe>`. No inline bazel calls — recipes are
# the contract surface. See the justfile "Bazel — what CI runs" section.
#
# Documentation builds run in a separate `docs` job (Python / mkdocs).

name: ci

on:
  schedule:
    # run on midnight every day
    - cron: '0 0 * * *'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}
    name: test / ${{ matrix.platform }}
    permissions:
      contents: read
      pull-requests: write   # Docker Scout PR comment
      security-events: write # SARIF upload (linux-amd64 only)
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.platform }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            arch: amd64
            runs-on: ubuntu-24.04
          - platform: linux-arm64
            arch: arm64
            runs-on: ubuntu-24.04-arm
          - platform: darwin-arm64
            arch: arm64
            runs-on: macos-14
    steps:
      # GitHub-hosted ubuntu-24.04 runners ship ~14 GB of free disk space,
      # ~6 GB of which is consumed by pre-installed SDKs the Bazel build
      # doesn't touch (Android, .NET, Haskell, Boost…). The LLVM 19.1.7
      # toolchain alone extracts to ~3 GB; piling the 22 ext libs +
      # sysroot + cache directory on top blows past the quota and kills
      # the build with `No space left on device`. macOS runners have
      # plenty of headroom and skip this step.
      - name: free disk space (linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false  # don't auto-pull LFS — use cache below
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: Enforce shttps→sipi boundary
        run: bash scripts/shttps-context-check.sh
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # The `kakadu_archive` repository_rule reads GH_TOKEN from the
          # environment via `gh release download`; configurable-impure-env
          # keeps Nix's daemon from sanitising it out of `nix develop`.
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      # Skip on forked PRs and on macOS runners — DOCKER_HUB_TOKEN is
      # unavailable to forks (and macOS doesn't run Docker steps anyway).
      # The smoke test consumes a locally loaded image, so login is only
      # useful for authenticated Docker Hub pulls (rate-limit avoidance)
      # on internal Linux PRs and the nightly schedule.
      - uses: docker/login-action@v4
        if: runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install --inputs-from . nixpkgs#just nixpkgs#hurl

      # CACHE STRATEGY:
      #
      # bazel-remote on Cloud Run (us-central1, scale-to-zero) fronts
      # gs://dasch-bazel-cache and serves the gRPC Remote Cache + Remote
      # Asset APIs. One bucket backs three Bazel cache layers from the
      # same endpoint: AC, CAS (--remote_cache), and http_archive
      # tarballs (--experimental_remote_downloader).
      #
      # Access is gated by HTTP Basic Auth inside bazel-remote (Cloud
      # Run IAM is bypassed because Bazel's gRPC client doesn't speak
      # Cloud Run OIDC). Credentials are supplied by a Bazel credential
      # helper (`tools/bazel-cred-helper.sh`), which reads
      # `$BAZEL_CACHE_PASSWORD` from the workflow env and emits an
      # `Authorization: Basic <b64>` gRPC metadata header on demand.
      # This sidesteps two failure modes of the simpler approaches:
      # (1) inline URI credentials (grpcs://user:pass@host) trip Cloud
      # Run's GFE which rejects :authority headers that contain user:
      # pass@host; (2) --remote_header=Authorization=Basic <b64> loses
      # its embedded space when `just`'s {{FLAGS}} substitution
      # re-tokenises the recipe args.
      #
      # Skipped on fork PRs (secrets unavailable). Those builds run cold
      # without the remote cache — same gating idiom as docker/login-action.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: false
          repository-cache: false

      # Build sipi + run the full test suite (unit + approval + e2e).
      # linux-amd64 runs `bazel-coverage` (instrumented build, emits
      # lcov at bazel-out/_coverage/_coverage_report.dat for the
      # Codecov upload below). linux-arm64 and darwin-arm64 run
      # `bazel-test` (fastbuild, no instrumentation) — same test
      # signal without paying the 1.5-2x compile + runtime cost of
      # coverage instrumentation on arches that don't upload.
      #
      # `nix develop --command` activates the dev shell so `gh`
      # (kakadu_archive repository_rule) + foreign_cc host tools
      # (cmake, perl, pkg-config, autoconf, automake, libtoolize) are
      # on PATH. The `if [ -n "$BAZEL_CACHE_PASSWORD" ]` block builds
      # the `--remote_cache` + `--experimental_remote_downloader` +
      # `--credential_helper` flag string in $REMOTE only when the
      # secret is present (fork PRs run cold). `--sandbox_debug`
      # keeps the sandbox tree on failure so foreign_cc Make.log
      # files (dumped by the failure step below) survive.
      - name: Build + run all tests under coverage
        if: ${{ matrix.platform == 'linux-amd64' }}
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          nix develop --command bash -c "just bazel-coverage $REMOTE --sandbox_debug"

      - name: Build + run all tests (no coverage)
        if: ${{ matrix.platform != 'linux-amd64' }}
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          nix develop --command bash -c "just bazel-test $REMOTE --sandbox_debug"

      # Hurl is an HTTP-contract test that shells out to the built sipi
      # binary directly (not via Bazel). Both `bazel-coverage` and
      # `bazel-test` produce `bazel-bin/src/cli/sipi` (with or without
      # coverage instrumentation; HTTP behaviour is identical).
      - name: Run Hurl contract tests
        run: just hurl-test

      # Codecov consumes the combined lcov directly — no cobertura
      # conversion. Linux-amd64 only: a single platform's report is
      # sufficient signal; Codecov merges if we ever enable more.
      - name: Upload coverage to Codecov
        if: ${{ matrix.platform == 'linux-amd64' }}
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: dasch-swiss/sipi
          files: bazel-out/_coverage/_coverage_report.dat

      # On any bazel failure above, locate and dump every foreign_cc
      # Make.log under the bazel output base. rules_foreign_cc writes
      # the captured stderr/stdout of each `make()` action into a
      # Make.log alongside the action's output tree; with
      # `--sandbox_debug` those survive action failure. Converts
      # "output X was not created" diagnostics into the actual Make
      # stderr.
      - name: Dump foreign_cc Make.log files on failure
        if: failure()
        run: |
          set +e
          echo "=== searching for foreign_cc *.log files ==="
          find "$HOME/.bazel" /home/runner/work /Users/runner/work -type f \
            \( -name "Make.log" -o -name "configure.log" -o -name "build.log" -o -name "CMake.log" \) \
            -print 2>/dev/null | while read -r f; do
            echo
            echo "===== $f ====="
            cat "$f"
          done
          echo
          echo "=== end of foreign_cc log dump ==="

      # Docker steps run on Linux only: //src:image is gated by host-CPU
      # `target_compatible_with` and would error out on macOS-aarch64.
      #
      # `bazel-test-smoke` is one Bazel invocation that:
      #   1. Builds //src:image as a transitive `data` dep of
      #      //test/e2e-rust:docker_smoke.
      #   2. Runs the smoke test, whose startup code does
      #      `docker load -i $SIPI_IMAGE_TAR` — the image lands in the
      #      local Docker daemon as `daschswiss/sipi:latest` (matching
      #      `oci_load.repo_tags`).
      #   3. Probes HTTP endpoints against the loaded container.
      #
      # Docker Scout reads `local://daschswiss/sipi:latest` left in the
      # daemon by step 2 — no separate build/load step needed.
      - name: Run Docker smoke tests (builds + loads image as side effect)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          nix develop --command bash -c "just bazel-test-smoke $REMOTE"

      - name: Docker Scout — compare to production
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss

      - name: Docker Scout — CVE report (SARIF)
        if: runner.os == 'Linux' && github.event_name == 'pull_request' && matrix.platform == 'linux-amd64'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://daschswiss/sipi:latest
          sarif-file: scout-results.sarif
          only-severities: critical,high
          write-comment: false
          organization: daschswiss

      - name: Upload SARIF to GitHub Security
        if: runner.os == 'Linux' && github.event_name == 'pull_request' && matrix.platform == 'linux-amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

  # Build documentation. Pure Python/MkDocs — Nix is only here so we can
  # provision `just` consistently with the other jobs.
  docs:
    name: docs
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-docs-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix profile install --inputs-from . nixpkgs#just
      - run: just docs-install-requirements
      - run: just docs-build
