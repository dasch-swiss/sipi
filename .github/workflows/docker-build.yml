name: docker

on:
  schedule:
    # run on midnight every day
    - cron: '0 0 * * *'
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:

  # Docker build for amd64
  build_amd64:
    name: amd64
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.ref }}-docker-build-amd64
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install nixpkgs#just
      - name: Build Docker image (Nix dockerTools)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-docker-build-amd64
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - run: pip3 install pytest requests testcontainers
      - run: just test-smoke-ci
      - name: Docker Scout — compare to production
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss
      - name: Docker Scout — CVE report (SARIF)
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://daschswiss/sipi:latest
          sarif-file: scout-results.sarif
          only-severities: critical,high
          write-comment: false
          organization: daschswiss
      - name: Upload SARIF to GitHub Security
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

  # Docker build for arm64
  build_arm64:
    name: arm64
    runs-on: ubuntu-24.04-arm
    concurrency:
      group: ${{ github.ref }}-docker-build-arm64
      cancel-in-progress: true
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install nixpkgs#just
      - name: Build Docker image (Nix dockerTools)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-docker-build-arm64
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - run: pip3 install pytest requests testcontainers
      - run: just test-smoke-ci
      - name: Docker Scout — compare to production
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: local://daschswiss/sipi:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          organization: daschswiss

  # build documentation
  build_docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: dasch-swiss/sipi/.github/actions/setup-python@main
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix profile install nixpkgs#just
      - run: just docs-install-requirements
      - run: just docs-build
