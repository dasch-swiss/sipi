# Nightly load test: measures throughput and latency baselines using wrk.
# Results are uploaded as CI artifacts for trend analysis.
#
# Runs at 04:00 UTC (after sanitizer at 03:00).
# Not run on PRs — load tests are too slow and noisy for PR feedback.

permissions:
  contents: read

on:
  schedule:
    # Run at 04:00 UTC every night
    - cron: '0 4 * * *'
  workflow_dispatch:

name: loadtest

concurrency:
  group: loadtest
  cancel-in-progress: false

jobs:
  loadtest:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    name: wrk / amd64
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: cachix/cachix-action@v15
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Build sipi
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: |
          nix develop --command bash -c "just nix-build"

      - name: Start sipi server
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: |
          # exec replaces the inner bash with sipi so the tracked PID is sipi's
          # wrapper (nix develop's direct child), not a throwaway shell.
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c \
              "cd test/_test_data && exec ../../build/sipi --config config/sipi.e2e-test-config.lua" \
            > sipi.log 2>&1 &
          SIPI_PID=$!
          echo "$SIPI_PID" > sipi.pid
          echo "Started sipi (wrapper PID $SIPI_PID)"

          # Fail fast: if the wrapper exits before readiness, dump the log and abort.
          for i in $(seq 1 30); do
            if ! kill -0 "$SIPI_PID" 2>/dev/null; then
              echo "::error::sipi exited before becoming ready (after ${i}s)"
              cat sipi.log
              exit 1
            fi
            if curl -sf http://127.0.0.1:1024/unit/lena512.jp2/info.json > /dev/null 2>&1; then
              echo "sipi ready after ${i}s"
              exit 0
            fi
            sleep 1
          done

          echo "::error::sipi did not become ready within 30s"
          cat sipi.log
          kill "$SIPI_PID" 2>/dev/null || true
          exit 1

      - name: Run load tests
        run: |
          mkdir -p loadtest-results

          echo "=== info.json throughput (30s, 4 threads, 16 connections) ==="
          wrk -t4 -c16 -d30s http://127.0.0.1:1024/unit/lena512.jp2/info.json \
            2>&1 | tee loadtest-results/info-json.txt

          echo ""
          echo "=== 256x256 JPEG throughput (30s, 4 threads, 16 connections) ==="
          wrk -t4 -c16 -d30s http://127.0.0.1:1024/unit/lena512.jp2/full/256,256/0/default.jpg \
            2>&1 | tee loadtest-results/image-256.txt

          echo ""
          echo "=== 512x512 JPEG throughput (30s, 2 threads, 8 connections) ==="
          wrk -t2 -c8 -d30s http://127.0.0.1:1024/unit/lena512.jp2/full/512,512/0/default.jpg \
            2>&1 | tee loadtest-results/image-512.txt

          # Generate summary
          echo "# Load Test Results - $(date -u +%Y-%m-%d)" > loadtest-results/summary.md
          echo "" >> loadtest-results/summary.md
          for f in loadtest-results/*.txt; do
            echo "## $(basename "$f" .txt)" >> loadtest-results/summary.md
            echo '```' >> loadtest-results/summary.md
            cat "$f" >> loadtest-results/summary.md
            echo '```' >> loadtest-results/summary.md
            echo "" >> loadtest-results/summary.md
          done

      - name: Stop sipi server
        if: always()
        run: |
          if [ -f sipi.pid ]; then
            SIPI_PID=$(cat sipi.pid)
            pkill -TERM -P "$SIPI_PID" 2>/dev/null || true
            kill  -TERM    "$SIPI_PID" 2>/dev/null || true
            for i in $(seq 1 5); do
              kill -0 "$SIPI_PID" 2>/dev/null || break
              sleep 1
            done
            kill -KILL "$SIPI_PID" 2>/dev/null || true
          fi
          # Fallback: name-match in case the PID chain was broken by nix develop.
          pkill -f "sipi.*e2e-test-config" 2>/dev/null || true

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loadtest-results
          retention-days: 90
          path: loadtest-results/

      - name: Upload sipi startup log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sipi-server-log
          retention-days: 30
          path: sipi.log
