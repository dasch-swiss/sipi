name: publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docker:
    runs-on: ${{ matrix.runner }}
    name: validate-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            build_target: docker-test-build-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            build_target: docker-test-build-arm64
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Expose GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');
      - run: make ${{ matrix.build_target }}
      - run: make test-smoke-ci

  validate-static:
    runs-on: ${{ matrix.runner }}
    name: validate-static / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            zig_target: x86_64-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
    steps:
      # --- Host: checkout + zig install (JS actions) ---
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Determine version
        run: |
          echo "VERSION=$(git describe --tag --dirty --abbrev=7)" >> "$GITHUB_ENV"

      # --- Alpine Docker: build ---
      - name: Build in Alpine container
        env:
          ZIG_TARGET: ${{ matrix.zig_target }}
          VERSION: ${{ env.VERSION }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v "$(dirname $(which zig)):/zig-bin" \
            -e ZIG_TARGET \
            -e VERSION \
            -w "$GITHUB_WORKSPACE" \
            alpine:3.21 sh -c '
              apk add --no-cache bash git cmake make autoconf automake libtool \
                binutils ca-certificates curl tar xz readline-dev xxd unzip \
                file pkgconf linux-headers lua5.3
              ln -sf /usr/bin/lua5.3 /usr/local/bin/lua
              export PATH="/zig-bin:$PATH"
              cmake -S . -B build \
                -G "Unix Makefiles" \
                -DCMAKE_TOOLCHAIN_FILE=cmake/zig-toolchain.cmake \
                -DZIG_TARGET=$ZIG_TARGET \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
                -DEXT_PROVIDED_VERSION=$VERSION
              cmake --build build --parallel $(nproc)
            '

      # --- Host: verify + test ---
      - name: Fix build output permissions
        run: sudo chown -R $(id -u):$(id -g) build

      - name: Verify static linkage
        run: |
          file build/sipi
          ldd build/sipi 2>&1 | grep -qi "not a dynamic\|statically linked\|not a valid dynamic"
          ! readelf -d build/sipi | grep -q '(NEEDED)'

      - name: Run unit tests
        run: |
          failed=0
          for test_dir in build/test/unit/*/; do
            for bin in "$test_dir"/*; do
              if [ -x "$bin" ] && [ -f "$bin" ]; then
                echo "--- ${bin} ---"
                (cd "$test_dir" && "./${bin##*/}") || failed=1
              fi
            done
          done
          if [ -x "build/test/approval/sipi.approvaltests" ]; then
            echo "--- approval tests ---"
            (cd build/test/approval && ./sipi.approvaltests) || failed=1
          fi
          [ "$failed" -eq 0 ] || exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust e2e tests
        env:
          SIPI_BIN: ${{ github.workspace }}/build/sipi
        run: cd test/e2e-rust && cargo test -- --test-threads=1

      # --- Host: package release ---
      - name: Package release archive
        run: |
          mkdir -p release/sipi-$VERSION-${{ matrix.arch }}
          mkdir -p release/debug

          cp build/sipi release/sipi-$VERSION-${{ matrix.arch }}/sipi

          objcopy --only-keep-debug \
            release/sipi-$VERSION-${{ matrix.arch }}/sipi \
            release/debug/sipi-linux-${{ matrix.arch }}.debug

          strip release/sipi-$VERSION-${{ matrix.arch }}/sipi

          objcopy --add-gnu-debuglink=release/debug/sipi-linux-${{ matrix.arch }}.debug \
            release/sipi-$VERSION-${{ matrix.arch }}/sipi

          cp config/sipi.config.lua release/sipi-$VERSION-${{ matrix.arch }}/
          cp config/sipi.init.lua release/sipi-$VERSION-${{ matrix.arch }}/
          cp -r scripts/ release/sipi-$VERSION-${{ matrix.arch }}/scripts/
          cp -r server/ release/sipi-$VERSION-${{ matrix.arch }}/server/

          tar czf release/sipi-$VERSION-linux-${{ matrix.arch }}.tar.gz -C release sipi-$VERSION-${{ matrix.arch }}/
          sha256sum release/sipi-$VERSION-linux-${{ matrix.arch }}.tar.gz > release/sipi-$VERSION-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: static-linux-release-${{ matrix.arch }}
          path: |
            release/*.tar.gz
            release/*.sha256
            release/debug/*.debug

  release-gate:
    runs-on: ubuntu-latest
    needs: [validate-docker, validate-static]
    steps:
      - name: Validation gate
        run: echo "Docker and static validation passed; publish side effects may proceed."

  publish-docker:
    runs-on: ${{ matrix.runner }}
    needs: [release-gate]
    name: publish-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            build_target: docker-test-build-amd64
            push_target: docker-push-amd64
            debug_file: sipi-amd64.debug
            sbom_file: sbom-amd64.spdx.json
            sbom_name: sbom-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            build_target: docker-test-build-arm64
            push_target: docker-push-arm64
            debug_file: sipi-arm64.debug
            sbom_file: sbom-arm64.spdx.json
            sbom_name: sbom-arm64
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Expose GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');

      - run: make ${{ matrix.build_target }}
      - run: make test-smoke-ci
      - name: Push image to Docker Hub
        run: make ${{ matrix.push_target }}

      - name: Docker Scout — record production
        uses: docker/scout-action@v1
        with:
          command: environment
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          environment: production
          organization: daschswiss

      - name: Docker Scout — generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          output: ${{ matrix.sbom_file }}
          organization: daschswiss

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_name }}
          path: ${{ matrix.sbom_file }}

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload Docker debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -f "${{ matrix.debug_file }}" ]; then
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "${{ matrix.debug_file }}"
          else
            echo "Expected debug symbol file not found: ${{ matrix.debug_file }}"
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: make docker-publish-manifest

  publish-static-release:
    runs-on: ubuntu-latest
    needs: [release-gate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download static artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: static-linux-release-*
          path: artifacts/
          merge-multiple: true

      - name: Show collected artifacts
        run: find artifacts -maxdepth 3 -type f | sort

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload static debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          shopt -s nullglob globstar
          debug_files=(artifacts/**/*.debug)
          if [ ${#debug_files[@]} -eq 0 ]; then
            echo "No static debug symbol files found"
            exit 1
          fi

          for debug_file in "${debug_files[@]}"; do
            echo "Uploading $debug_file"
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "$debug_file"
          done

      - name: Attach static assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  sentry:
    runs-on: ubuntu-latest
    needs: [manifest, publish-static-release]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          echo "RELEASE_VERSION=$(git describe --tag --dirty --abbrev=7)" >> $GITHUB_ENV
      - uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}

  docs:
    runs-on: ubuntu-latest
    needs: [release-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Remove LFS hooks (not needed for docs deploy)
        run: rm -f .git/hooks/pre-push
      - uses: mhausenblas/mkdocs-deploy-gh-pages@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CUSTOM_DOMAIN: sipi.io
          CONFIG_FILE: docs/mkdocs.yml
          REQUIREMENTS: docs/requirements.txt
