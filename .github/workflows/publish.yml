name: publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docker:
    runs-on: ${{ matrix.runner }}
    name: validate-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - run: nix profile install --inputs-from . nixpkgs#just
      - uses: actions/cache@v5
        id: bazel-disk-cache
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-publish-validate-${{ matrix.arch }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'ext/**/BUILD.bazel', 'bazel/**', 'patches/**', 'platforms/**', '.bazelrc', '.bazelversion', 'flake.lock') }}
          restore-keys: |
            bazel-disk-publish-validate-${{ matrix.arch }}-
            bazel-disk-ci-test-${{ matrix.arch }}-
      - name: Build Docker image (Bazel rules_oci)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # See ci.yml for the `nix develop --command` rationale (foreign_cc
        # host-tool PATH).
        run: nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} --disk_cache=\$HOME/.cache/bazel-disk"
      # Smoke tests still consume the Nix-built `.#smoke-test` runner
      # until Y+5 (DEV-6347) ports them to `rules_rust`. The image under
      # test is the Bazel-built one loaded by the step above.
      - run: just nix-test-smoke

  release-gate:
    runs-on: ubuntu-latest
    needs: [validate-docker]
    steps:
      - name: Validation gate
        run: echo "Docker validation passed; publish side effects may proceed."

  publish-docker:
    runs-on: ${{ matrix.runner }}
    needs: [release-gate]
    name: publish-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            debug_file: sipi-amd64.debug
            sbom_file: sbom-amd64.spdx.json
            sbom_name: sbom-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            debug_file: sipi-arm64.debug
            sbom_file: sbom-arm64.spdx.json
            sbom_name: sbom-arm64
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - run: nix profile install --inputs-from . nixpkgs#just
      - uses: actions/cache@v5
        id: bazel-disk-cache
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-publish-${{ matrix.arch }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'ext/**/BUILD.bazel', 'bazel/**', 'patches/**', 'platforms/**', '.bazelrc', '.bazelversion', 'flake.lock') }}
          restore-keys: |
            bazel-disk-publish-${{ matrix.arch }}-
            bazel-disk-publish-validate-${{ matrix.arch }}-
            bazel-disk-ci-test-${{ matrix.arch }}-
      - name: Build Docker image (Bazel rules_oci) + sipi-debug
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # Binary version + OCI image tag come from version.txt, which
        # release-please updates before cutting the tag — no extra
        # plumbing required to keep them in sync with `${github.ref_name}`.
        # See ci.yml for the `nix develop --command` rationale.
        run: nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} --disk_cache=\$HOME/.cache/bazel-disk"
      - name: Extract debug symbols for Sentry upload
        # `--disk_cache` lets the genrule reuse the build artifacts the
        # build step just produced (the genrule depends on `:sipi`, which
        # is already built and in the disk cache).
        run: nix develop --command bash -c "just bazel-docker-extract-debug ${{ matrix.arch }} --disk_cache=\$HOME/.cache/bazel-disk"
      - run: just nix-test-smoke
      - name: Push image to Docker Hub
        run: nix develop --command bash -c "just bazel-docker-push-${{ matrix.arch }} --disk_cache=\$HOME/.cache/bazel-disk"

      - name: Docker Scout — record production
        uses: docker/scout-action@v1
        with:
          command: environment
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          environment: production
          organization: daschswiss

      - name: Docker Scout — generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          output: ${{ matrix.sbom_file }}
          organization: daschswiss

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_name }}
          path: ${{ matrix.sbom_file }}

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload Docker debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -f "${{ matrix.debug_file }}" ]; then
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "${{ matrix.debug_file }}"
          else
            echo "Expected debug symbol file not found: ${{ matrix.debug_file }}"
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix profile install --inputs-from . nixpkgs#just
      # `bazel-docker-publish-manifest` shells out to `crane index append`,
      # which only exists inside the dev shell (go-containerregistry).
      - run: nix develop --command bash -c "just bazel-docker-publish-manifest"

  sentry:
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          echo "RELEASE_VERSION=$(git describe --tag --dirty --abbrev=7)" >> $GITHUB_ENV
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}

  docs:
    runs-on: ubuntu-latest
    needs: [release-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Remove LFS hooks (not needed for docs deploy)
        run: rm -f .git/hooks/pre-push
      - uses: mhausenblas/mkdocs-deploy-gh-pages@a31c6b13a80e4a4fbb525eeb7a2a78253bb15fa5  # master @ 2024-07-19
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CUSTOM_DOMAIN: sipi.io
          CONFIG_FILE: docs/mkdocs.yml
          REQUIREMENTS: docs/requirements.txt
