name: publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docker:
    runs-on: ${{ matrix.runner }}
    name: validate-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      # Cache via bazel-remote on Cloud Run (gRPC). See ci.yml for full
      # topology. publish.yml only runs on `v*` tag pushes — no fork-PR
      # gating needed.
      - name: Build Docker image (Bazel rules_oci)
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        # See ci.yml for the `nix develop --command` rationale (foreign_cc
        # host-tool PATH).
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} $REMOTE $BES"
      # `:docker_smoke` rust_test loads the OCI tarball produced by
      # `//src:image_load` and runs the smoke suite against it. The Docker
      # image already loaded by the build step above is left alone.
      - name: Run Docker smoke tests
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-test-smoke $REMOTE $BES"

  release-gate:
    runs-on: ubuntu-latest
    needs: [validate-docker]
    steps:
      - name: Validation gate
        run: echo "Docker validation passed; publish side effects may proceed."

  publish-docker:
    runs-on: ${{ matrix.runner }}
    needs: [release-gate]
    name: publish-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            debug_file: sipi-amd64.debug
            sbom_file: sbom-amd64.spdx.json
            sbom_name: sbom-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            debug_file: sipi-arm64.debug
            sbom_file: sbom-arm64.spdx.json
            sbom_name: sbom-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Cache via bazel-remote on Cloud Run (gRPC). The validate-docker
      # job warmed the cache; this job should hit it for ~100 % of
      # compile actions when the source tree is unchanged between the
      # two jobs (release-please tag push).
      - name: Build Docker image (Bazel rules_oci) + sipi-debug
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        # Binary version + OCI image tag come from version.txt, which
        # release-please updates before cutting the tag — no extra
        # plumbing required to keep them in sync with `${github.ref_name}`.
        # See ci.yml for the `nix develop --command` rationale.
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} $REMOTE $BES"
      - name: Extract debug symbols for Sentry upload
        env:
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        # The genrule depends on `:sipi`, already built and in the
        # remote cache from the build step just above.
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-docker-extract-debug ${{ matrix.arch }} $REMOTE $BES"
      - name: Run Docker smoke tests
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-test-smoke $REMOTE $BES"
      - name: Push image to Docker Hub
        env:
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
          BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
        run: |
          if [ -n "$BAZEL_CACHE_PASSWORD" ]; then
            CACHE_HOST=bazel-cache-proxy-pbjdzenira-uc.a.run.app
            REMOTE="--remote_cache=grpcs://$CACHE_HOST:443 --experimental_remote_downloader=grpcs://$CACHE_HOST:443 --experimental_remote_downloader_local_fallback --credential_helper=$CACHE_HOST=$GITHUB_WORKSPACE/tools/bazel-cred-helper.sh --remote_upload_local_results=true"
          else
            REMOTE=""
          fi
          if [ -n "$BUILDBUDDY_ORG_API_KEY" ]; then
            BES="--bes_backend=grpcs://dasch.buildbuddy.io --bes_results_url=https://dasch.buildbuddy.io/invocation/ --bes_header=x-buildbuddy-api-key=$BUILDBUDDY_ORG_API_KEY --build_metadata=ROLE=CI"
          else
            BES=""
          fi
          nix develop --command bash -c "just bazel-docker-push-${{ matrix.arch }} $REMOTE $BES"

      - name: Docker Scout — record production
        uses: docker/scout-action@v1
        with:
          command: environment
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          environment: production
          organization: daschswiss

      - name: Docker Scout — generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          output: ${{ matrix.sbom_file }}
          organization: daschswiss

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_name }}
          path: ${{ matrix.sbom_file }}

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload Docker debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -f "${{ matrix.debug_file }}" ]; then
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "${{ matrix.debug_file }}"
          else
            echo "Expected debug symbol file not found: ${{ matrix.debug_file }}"
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      # `bazel-docker-publish-manifest` shells out to `crane index append`,
      # which only exists inside the dev shell (go-containerregistry).
      - run: nix develop --command bash -c "just bazel-docker-publish-manifest"

  sentry:
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          echo "RELEASE_VERSION=$(git describe --tag --dirty --abbrev=7)" >> $GITHUB_ENV
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}

  docs:
    runs-on: ubuntu-latest
    needs: [release-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Remove LFS hooks (not needed for docs deploy)
        run: rm -f .git/hooks/pre-push
      - uses: mhausenblas/mkdocs-deploy-gh-pages@a31c6b13a80e4a4fbb525eeb7a2a78253bb15fa5  # master @ 2024-07-19
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CUSTOM_DOMAIN: sipi.io
          CONFIG_FILE: docs/mkdocs.yml
          REQUIREMENTS: docs/requirements.txt
