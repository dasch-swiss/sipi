name: publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docker:
    runs-on: ${{ matrix.runner }}
    name: validate-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel-platform: "//platforms:linux_x86_64"
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel-platform: "//platforms:linux_aarch64"
    env:
      # Every bazel build/run/test in this job re-evaluates the
      # gh_release_archive repository_rule, which fetches from a private
      # GitHub release and requires GH_TOKEN. Hoisted to the job level so
      # any future Bazel step inherits it (cf. publish.yml history where
      # adding it per-step caused repeated near-miss failures).
      GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      # Persist Bazel's repository cache (--repository_cache in .bazelrc) across
      # runs: external archives + bzlmod registry files download from upstream
      # only when MODULE.bazel.lock changes.
      - name: Restore Bazel repository cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      # Remote cache + executor via the bazel-rbe composite action (runner +
      # cache endpoints, mTLS). Per-arch target-platform so each leg
      # cross-compiles its release image on the x86_64 worker. publish.yml only
      # runs on `v*` tag pushes — no fork-PR gating needed.
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
          target-platform: ${{ matrix.bazel-platform }}
      - name: Build Docker image (Bazel rules_oci)
        # See ci.yml for the `nix develop --command` rationale (`gh` on PATH
        # for the kakadu fetch).
        run: nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} ${{ steps.rbe.outputs.flags }}"
      # `:docker_smoke` rust_test loads the OCI tarball produced by
      # `//src:image_load` and runs the smoke suite against it. The Docker
      # image already loaded by the build step above is left alone.
      - name: Run Docker smoke tests
        run: nix develop --command bash -c "just bazel-test-smoke ${{ steps.rbe.outputs.flags }}"

  release-gate:
    runs-on: ubuntu-latest
    needs: [validate-docker]
    steps:
      - name: Validation gate
        run: echo "Docker validation passed; publish side effects may proceed."

  publish-docker:
    runs-on: ${{ matrix.runner }}
    needs: [release-gate]
    name: publish-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel-platform: "//platforms:linux_x86_64"
            debug_file: sipi-amd64.debug
            sbom_file: sbom-amd64.spdx.json
            sbom_name: sbom-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel-platform: "//platforms:linux_aarch64"
            debug_file: sipi-arm64.debug
            sbom_file: sbom-arm64.spdx.json
            sbom_name: sbom-arm64
    env:
      # Every bazel build/run/test in this job re-evaluates the
      # gh_release_archive repository_rule, which fetches from a private
      # GitHub release and requires GH_TOKEN. Hoisted to the job level so
      # any future Bazel step inherits it.
      GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Persist Bazel's repository cache (--repository_cache in .bazelrc) across
      # runs: external archives + bzlmod registry files download from upstream
      # only when MODULE.bazel.lock changes.
      - name: Restore Bazel repository cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      # Remote cache + executor via the bazel-rbe composite action. The
      # validate-docker job warmed the cache; this job should hit it for
      # ~100% of compile actions when the source tree is unchanged between
      # the two jobs (release-please tag push).
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
          target-platform: ${{ matrix.bazel-platform }}
      - name: Build Docker image (Bazel rules_oci) + sipi-debug
        # Binary version + OCI image tag come from version.txt, which
        # release-please updates before cutting the tag — no extra
        # plumbing required to keep them in sync with `${github.ref_name}`.
        # See ci.yml for the `nix develop --command` rationale.
        run: nix develop --command bash -c "just bazel-docker-build-${{ matrix.arch }} ${{ steps.rbe.outputs.flags }}"
      - name: Extract debug symbols for Sentry upload
        # The genrule depends on `:sipi`, already built and in the
        # remote cache from the build step just above.
        run: nix develop --command bash -c "just bazel-docker-extract-debug ${{ matrix.arch }} ${{ steps.rbe.outputs.flags }}"
      - name: Run Docker smoke tests
        run: nix develop --command bash -c "just bazel-test-smoke ${{ steps.rbe.outputs.flags }}"
      - name: Push image to Docker Hub
        run: nix develop --command bash -c "just bazel-docker-push-${{ matrix.arch }} ${{ steps.rbe.outputs.flags }}"

      - name: Docker Scout — record production
        uses: docker/scout-action@v1
        with:
          command: environment
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          environment: production
          organization: daschswiss

      - name: Docker Scout — generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          output: ${{ matrix.sbom_file }}
          organization: daschswiss

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_name }}
          path: ${{ matrix.sbom_file }}

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload Docker debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -f "${{ matrix.debug_file }}" ]; then
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "${{ matrix.debug_file }}"
          else
            echo "Expected debug symbol file not found: ${{ matrix.debug_file }}"
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.
      # `bazel-docker-publish-manifest` shells out to `crane index append`,
      # which only exists inside the dev shell (go-containerregistry).
      - run: nix develop --command bash -c "just bazel-docker-publish-manifest"

  sentry:
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          echo "RELEASE_VERSION=$(git describe --tag --dirty --abbrev=7)" >> $GITHUB_ENV
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}

  docs:
    runs-on: ubuntu-latest
    needs: [release-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Remove LFS hooks (not needed for docs deploy)
        run: rm -f .git/hooks/pre-push
      - uses: mhausenblas/mkdocs-deploy-gh-pages@a31c6b13a80e4a4fbb525eeb7a2a78253bb15fa5  # master @ 2024-07-19
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CUSTOM_DOMAIN: sipi.io
          CONFIG_FILE: docs/mkdocs.yml
          REQUIREMENTS: docs/requirements.txt
