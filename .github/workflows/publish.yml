name: publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docker:
    runs-on: ${{ matrix.runner }}
    name: validate-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel-platform: "//platforms:linux_x86_64"
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel-platform: "//platforms:linux_aarch64"
    env:
      # Every bazel build/run/test in this job re-evaluates the
      # gh_release_archive repository_rule, which fetches from a private
      # GitHub release and requires GH_TOKEN. Hoisted to the job level so
      # any future Bazel step inherits it (cf. publish.yml history where
      # adding it per-step caused repeated near-miss failures).
      GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Set up CI environment
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          lfs: "true"
          target-platform: ${{ matrix.bazel-platform }}
          rbe-runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          rbe-ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          rbe-client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          rbe-client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build Docker image (Bazel rules_oci)
        run: just bazel-docker-build-${{ matrix.arch }} ${{ steps.setup.outputs.flags }}
      # Exercise the release-only debug-symbol extraction in the validation
      # stage so it can't silently break at publish time (as it did for
      # v6.0.0). The artifact is discarded here — publish-docker rebuilds it
      # for the actual Sentry upload.
      - name: Extract debug symbols (validation)
        run: just bazel-docker-extract-debug ${{ matrix.arch }} ${{ steps.setup.outputs.flags }}
      # `:docker_smoke` rust_test loads the OCI tarball produced by
      # `//src:image_load` and runs the smoke suite against it. The Docker
      # image already loaded by the build step above is left alone.
      - name: Run Docker smoke tests
        run: just bazel-test-smoke ${{ steps.setup.outputs.flags }}

  release-gate:
    runs-on: ubuntu-latest
    needs: [validate-docker]
    steps:
      - name: Validation gate
        run: echo "Docker validation passed; publish side effects may proceed."

  publish-docker:
    runs-on: ${{ matrix.runner }}
    needs: [release-gate]
    name: publish-docker / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel-platform: "//platforms:linux_x86_64"
            debug_file: sipi-amd64.debug
            sbom_file: sbom-amd64.spdx.json
            sbom_name: sbom-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel-platform: "//platforms:linux_aarch64"
            debug_file: sipi-arm64.debug
            sbom_file: sbom-arm64.spdx.json
            sbom_name: sbom-arm64
    env:
      # Every bazel build/run/test in this job re-evaluates the
      # gh_release_archive repository_rule, which fetches from a private
      # GitHub release and requires GH_TOKEN. Hoisted to the job level so
      # any future Bazel step inherits it.
      GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      # This job doesn't run the smoke test and build + extract-debug + push
      # read no LFS test images, so no LFS pull is needed here.
      - name: Set up CI environment
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          lfs: "false"
          target-platform: ${{ matrix.bazel-platform }}
          rbe-runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          rbe-ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          rbe-client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          rbe-client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build Docker image (Bazel rules_oci) + sipi-debug
        # Binary version + OCI image tag come from version.txt, which
        # release-please updates before cutting the tag — no extra
        # plumbing required to keep them in sync with `${github.ref_name}`.
        run: just bazel-docker-build-${{ matrix.arch }} ${{ steps.setup.outputs.flags }}
      - name: Extract debug symbols for Sentry upload
        # The genrule depends on `:sipi`, already built and in the
        # remote cache from the build step just above.
        run: just bazel-docker-extract-debug ${{ matrix.arch }} ${{ steps.setup.outputs.flags }}
      # The identical commit was already smoke-tested in validate-docker
      # minutes earlier — no need to repeat it here.
      # `oci_push` runs `jq` as an exec-platform tool. The arm64 image is
      # cross-built on the x86_64 RBE worker (exec = x86_64), so the push
      # script bundles the x86_64 `jq`, which can't execute on this arm64
      # runner. Register binfmt_misc so the kernel runs that x86_64 tool
      # under qemu emulation — the push is network-bound (crane uploads
      # layers) with only trivial jq work, so the emulation cost is
      # negligible and we keep the fast worker cross-build. amd64 runs the
      # push natively and needs none of this.
      - name: Enable x86_64 emulation for the cross-built push tooling
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Push image to Docker Hub
        run: just bazel-docker-push-${{ matrix.arch }} ${{ steps.setup.outputs.flags }}

      - name: Docker Scout — record production
        uses: docker/scout-action@v1
        with:
          command: environment
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          environment: production
          organization: daschswiss

      - name: Docker Scout — generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: registry://daschswiss/sipi:${{ github.ref_name }}-${{ matrix.arch }}
          output: ${{ matrix.sbom_file }}
          organization: daschswiss

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_name }}
          path: ${{ matrix.sbom_file }}

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Upload Docker debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -f "${{ matrix.debug_file }}" ]; then
            sentry-cli debug-files upload \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              "${{ matrix.debug_file }}"
          else
            echo "Expected debug symbol file not found: ${{ matrix.debug_file }}"
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: imjasonh/setup-crane@v0.7
      - uses: extractions/setup-just@v3
      # `bazel-docker-publish-manifest` shells out to `crane index append`;
      # no bazel invocation, so no RBE/Bazel setup is needed here.
      - run: just bazel-docker-publish-manifest

  sentry:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          echo "RELEASE_VERSION=$(git describe --tag --dirty --abbrev=7)" >> $GITHUB_ENV
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}

  docs:
    runs-on: ubuntu-latest
    needs: [release-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Remove LFS hooks (not needed for docs deploy)
        run: rm -f .git/hooks/pre-push
      - uses: mhausenblas/mkdocs-deploy-gh-pages@a31c6b13a80e4a4fbb525eeb7a2a78253bb15fa5  # master @ 2024-07-19
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CUSTOM_DOMAIN: sipi.io
          CONFIG_FILE: docs/mkdocs.yml
          REQUIREMENTS: docs/requirements.txt
