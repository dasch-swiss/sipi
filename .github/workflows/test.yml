# Main CI workflow for pull requests and scheduled verification.
# Includes:
#   - Nix/GCC build+unit matrix on Linux amd64/arm64 (Rust e2e + Hurl)
#   - Zig static Linux validation (Release, full unit+e2e) on internal PRs
#   - Zig native macOS arm64 build + dylib audit on internal PRs

permissions:
  contents: read

on:
  schedule:
    # run on midnight every day
    - cron: '0 0 * * *'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

name: test

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}
    name: nix-clang / ${{ matrix.arch }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify vendor ==="
          ls -la vendor/*.tar.gz | head -3
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}
      - name: Build and test (unit)
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c "make nix-build && make nix-test"
      - name: Rust e2e and Hurl tests
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c "make rust-test-e2e && make hurl-test"
      - name: Gather code coverage
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c "make nix-coverage"
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.arch == 'amd64' }}
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: dasch-swiss/sipi
          files: build/coverage.xml

  zig-static:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.runner }}
    name: zig-static / ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            zig_target: x86_64-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
    steps:
      # --- Host: checkout + zig install (JS actions) ---
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify vendor ==="
          ls -la vendor/*.tar.gz | head -3
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # --- Alpine Docker: build ---
      # Mount at the same absolute path as the host so that compiled-in
      # __FILE__ paths (used by ApprovalTests) resolve correctly when
      # tests run on the host.
      - name: Build in Alpine container
        env:
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v "$(dirname $(which zig)):/zig-bin" \
            -e ZIG_TARGET \
            -w "$GITHUB_WORKSPACE" \
            alpine:3.21 sh -c '
              apk add --no-cache bash git cmake make autoconf automake libtool \
                binutils ca-certificates curl tar xz readline-dev xxd unzip \
                file pkgconf linux-headers lua5.3
              ln -sf /usr/bin/lua5.3 /usr/local/bin/lua
              export PATH="/zig-bin:$PATH"
              cmake -S . -B build \
                -G "Unix Makefiles" \
                -DCMAKE_TOOLCHAIN_FILE=cmake/zig-toolchain.cmake \
                -DZIG_TARGET=$ZIG_TARGET \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
              cmake --build build --parallel $(nproc)
            '

      # --- Host: verify + test ---
      - name: Fix build output permissions
        run: sudo chown -R $(id -u):$(id -g) build

      - name: Verify static linkage
        run: |
          file build/sipi
          ldd build/sipi 2>&1 | grep -qi "not a dynamic\|statically linked\|not a valid dynamic"
          ! readelf -d build/sipi | grep -q '(NEEDED)'

      - name: Run unit tests
        run: |
          failed=0
          for test_dir in build/test/unit/*/; do
            for bin in "$test_dir"/*; do
              if [ -x "$bin" ] && [ -f "$bin" ]; then
                echo "--- ${bin} ---"
                (cd "$test_dir" && "./${bin##*/}") || failed=1
              fi
            done
          done
          if [ -x "build/test/approval/sipi.approvaltests" ]; then
            echo "--- approval tests ---"
            (cd build/test/approval && ./sipi.approvaltests) || failed=1
          fi
          [ "$failed" -eq 0 ] || exit 1

      - name: Rust e2e tests
        run: |
          cd test/e2e-rust && SIPI_BIN=$GITHUB_WORKSPACE/build/sipi cargo test -- --test-threads=1

  zig-macos-arm64:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-14
    name: zig-macos / arm64 dylib-audit
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: pull LFS objects
        run: |
          git lfs install
          echo "=== .gitattributes ==="
          head -5 .gitattributes
          echo "=== LFS env ==="
          git lfs env | head -10
          echo "=== LFS ls-files ==="
          git lfs ls-files | head -5
          echo "=== LFS fetch ==="
          git lfs fetch --all
          echo "=== LFS checkout ==="
          git lfs checkout
          echo "=== verify vendor ==="
          ls -la vendor/*.tar.gz | head -3
          echo "=== verify test images ==="
          file test/_test_data/unit/lena512.tif 2>/dev/null || echo "lena512.tif not found"
          file test/_test_data/unit/HasCommentBlock.JPG 2>/dev/null || echo "HasCommentBlock.JPG not found"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Verify Zig installation
        run: |
          zig version
          zig cc --version

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake autoconf automake libtool

      - name: Configure Release build
        run: |
          cmake -S . -B build-zig-macos \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=cmake/zig-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF

      - name: Build
        run: cmake --build build-zig-macos --parallel $(sysctl -n hw.ncpu)

      - name: Audit runtime dylibs
        run: |
          otool -L build-zig-macos/sipi
          deps="$(otool -L build-zig-macos/sipi | tail -n +2 | awk '{print $1}')"
          dep_count="$(printf '%s\n' "$deps" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$dep_count" -ne 1 ] || [ "$deps" != "/usr/lib/libSystem.B.dylib" ]; then
            echo "Unexpected dylib set detected:"
            printf '%s\n' "$deps"
            exit 1
          fi

          echo "macOS dylib policy satisfied"
