# Sanitizer build: ASan + UBSan on the e2e suite.
# Catches memory errors (buffer overflow, use-after-free, leaks) and
# undefined behavior that functional tests miss.
#
# Runs on every PR that touches C++/build files. This is a merge gate —
# sanitizer findings fail the PR check.
#
# Also available on-demand via workflow_dispatch.
#
# Single Bazel test step:
#   `just bazel-test-e2e --config=asan --config=ubsan` rebuilds the
#   sipi binary + e2e test binaries under ASan/UBSan and runs the
#   suite in one action graph. No separate sanitised-build step:
#   `bazel test //test/e2e-rust:all_e2e` already requires
#   `data = ["//src:sipi"]` and produces sipi under the test
#   invocation's configuration, so a pre-build with the same flags
#   would be duplicate work and one with different flags would be
#   discarded.
#
# `LSAN_OPTIONS` is set per-test by `test/e2e-rust/sipi_e2e_test.bzl`
# (each rust_test data-deps `//:lsan_suppressions`). `ASAN_OPTIONS`
# `log_path` is set by `.bazelrc`'s `test:asan` block to point at
# `$TEST_UNDECLARED_OUTPUTS_DIR/asan-e2e`, which Bazel surfaces under
# `bazel-testlogs/.../test.outputs/asan-e2e.<pid>`. This workflow is
# e2e-only — unit-test sanitizer coverage gates on the cutover of
# unit-test execution to Bazel `cc_test`.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'src/**'
      - 'shttps/**'
      - 'include/**'
      - 'test/**'
      - 'tools/**'
      - 'ext/**'
      - 'CMakeLists.txt'
      - 'flake.nix'
      - 'flake.lock'
      - 'package.nix'
      - 'justfile'
      - '.bazelrc'
      - '.bazelversion'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - 'BUILD.bazel'
      - '**/BUILD.bazel'
      - 'bazel/**'
      - '.github/workflows/sanitizer.yml'
  workflow_dispatch:

name: sanitizer

concurrency:
  group: sanitizer-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    name: asan-ubsan / amd64
    steps:
      # Sanitizer builds compile every foreign_cc ext lib under
      # `--compilation_mode=dbg` (`-O0 -g`) — larger object files than the
      # CI default. Without freeing pre-installed SDKs first, the LLVM 19
      # toolchain (~3 GB) plus 22 ext libs plus the Bazel disk cache blow
      # past ubuntu-24.04's ~14 GB free quota and the build dies with
      # `No space left on device`. Mirrors `.github/workflows/bazel-build.yml`.
      - name: free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v17
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Bazel disk cache. Without this, every sanitizer-gate run rebuilds
      # all foreign_cc ext libs (kakadu, openssl, exiv2, libtiff, …) under
      # `--compilation_mode=dbg` from cold — easily 10+ minutes per run
      # and at risk of hitting the 30-minute job timeout on bandwidth-poor
      # runners. Cache strategy mirrors `.github/workflows/bazel-build.yml`
      # (DEV-6371): `actions/cache` directly (not setup-bazel's built-in)
      # to avoid 0-byte poisoning on analysis-phase failures, and a
      # targeted key formula that excludes app/test sources whose changes
      # don't affect ext/ action keys.
      - uses: actions/cache@v5
        id: bazel-disk-cache
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-sanitizer-linux-x86_64-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'ext/**/BUILD.bazel', 'bazel/**', 'patches/**', 'platforms/**', '.bazelrc', '.bazelversion', 'flake.lock') }}
          restore-keys: |
            bazel-disk-sanitizer-linux-x86_64-
      # `just` drives the build; `llvmPackages_19.llvm` ships
      # `llvm-symbolizer`, which ASan/LSan need to resolve the
      # `(/nix/store/.../sipi+0xOFFSET)` frames into function names.
      # Without it the name-based suppressions in
      # `.lsan_suppressions.txt` (`leak:lua*`) can never match.
      - run: nix profile install --inputs-from . nixpkgs#just nixpkgs#llvmPackages_19.llvm

      - name: Run e2e tests under ASan + UBSan
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # `bazel test --config=asan --config=ubsan` rebuilds sipi (a
        # `data` dep of every e2e `rust_test` target) plus the tests
        # themselves under ASan/UBSan, then runs them — single action
        # graph, no separate sanitised-build step.
        #
        # `nix develop --command` is required so foreign_cc rules see
        # `gh` (kakadu repository_rule), `cmake`/`perl`/`pkg-config`/
        # `autoconf`/`automake`/`libtoolize`, and the Nix-injected
        # `NIX_LDFLAGS`/`ACLOCAL_PATH` (forwarded into foreign_cc
        # actions via `.bazelrc:--action_env=*`).
        #
        # `LSAN_OPTIONS` (suppressions path) is injected per-test by
        # `test/e2e-rust/sipi_e2e_test.bzl`; `ASAN_OPTIONS` (log_path)
        # by `.bazelrc`'s `test:asan` block — no env vars on this step.
        # `ASAN_SYMBOLIZER_PATH` is auto-detected via `llvm-symbolizer`
        # on PATH (installed above); ASan honours it before falling
        # through to PATH lookup, and the sanitised config keeps DWARF
        # inline (`--strip=never` + `--compilation_mode=dbg`) so the
        # symboliser has something to read.
        #
        # `--disk_cache` is set on the recipe's `*FLAGS` positional so
        # bash expands `$HOME` here — Bazel does not expand env vars
        # in .bazelrc paths (bazelbuild/bazel#15856). Path matches the
        # `actions/cache` step above so the cache is restored and
        # saved across CI runs.
        #
        # `--flaky_test_attempts=<target>@3` retries the latency-budget
        # tests up to 3 times under sanitizer instrumentation. Their
        # thresholds are calibrated for fastbuild; ASan/UBSan add 2-5x
        # runtime overhead which can push connection/cache assertions
        # over the budget on a single attempt. Scoped to the three
        # known timing-sensitive targets only — non-flaky tests keep
        # the default single-attempt run. The flag is `accumulate_value`,
        # so repeating it adds rather than overwrites; an alternation
        # regex (e.g. `:(latency|…)`) would traverse the outer `bash -c
        # "…"` quoting and get mis-parsed as a shell subshell, so
        # explicit per-target flags are safer.
        run: |
          export ASAN_SYMBOLIZER_PATH="$(command -v llvm-symbolizer)"
          nix develop --command bash -c "just bazel-test-e2e \
            --config=asan --config=ubsan \
            --flaky_test_attempts=//test/e2e-rust:latency@3 \
            --flaky_test_attempts=//test/e2e-rust:iiif_compliance@3 \
            --flaky_test_attempts=//test/e2e-rust:resource_limits@3 \
            --disk_cache=\$HOME/.cache/bazel-disk"

      - name: dump foreign_cc Make.log files on failure
        if: failure()
        # Same pattern as `bazel-build.yml`. When a `make()` /
        # `cmake()` foreign_cc rule fails, rules_foreign_cc captures
        # the underlying make/cmake stderr into a per-action `*.log`
        # file. With the build invoked above using
        # `--verbose_failures` (set in the recipe) the action's
        # command line is shown but the log file is not auto-cat'd —
        # do it here so the actual failure cause reaches the CI log.
        run: |
          OUTPUT_BASE=$(nix develop --command bash -c 'bazelisk info output_base' 2>/dev/null)
          if [ -n "$OUTPUT_BASE" ]; then
            find "$OUTPUT_BASE" -path '*foreign_cc*' -name '*.log' -print 2>/dev/null | while read -r log; do
              echo ""
              echo "═══════════════════════════════════════════════════"
              echo "Foreign_cc log: $log"
              echo "═══════════════════════════════════════════════════"
              cat "$log" || true
            done
          fi

      - name: Check for sanitizer findings in e2e
        if: always()
        run: |
          # Check for actual findings (SUMMARY lines), not just file existence.
          # ASan always writes a log file when log_path is set, even with zero
          # findings. The glob targets Bazel's per-test output dir:
          # `bazel-testlogs/test/e2e-rust/<target>/test.outputs/asan-e2e.<pid>`
          # — `.bazelrc`'s `test:asan` block sets
          # `ASAN_OPTIONS=…log_path=$TEST_UNDECLARED_OUTPUTS_DIR/asan-e2e`,
          # and Bazel surfaces `$TEST_UNDECLARED_OUTPUTS_DIR` files under
          # `test.outputs/`.
          GLOB="bazel-testlogs/test/e2e-rust/*/test.outputs/asan-e2e.*"
          HAS_FINDINGS=false
          if compgen -G "$GLOB" >/dev/null 2>&1 && grep -q "SUMMARY:" $GLOB 2>/dev/null; then
            HAS_FINDINGS=true
          fi
          if [ "$HAS_FINDINGS" = "true" ]; then
            echo "::error::Sanitizer findings detected in e2e — PR cannot merge with memory safety issues"
            echo ""
            echo "=== Unique findings ==="
            grep -h "SUMMARY:" $GLOB 2>/dev/null | sort -u || true
            echo ""
            echo "=== Full reports ==="
            for f in $GLOB; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              cat "$f"
              echo ""
            done
            exit 1
          fi
          echo "No sanitizer findings in e2e. All tests passed cleanly under ASan + UBSan."

      - name: Upload sanitizer reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-reports
          retention-days: 30
          # Glob mirrors the findings-check step above. Keeps the
          # artefact-name (`sanitizer-reports`) unchanged so the
          # publish/Sentry side of the workflow keeps working.
          path: bazel-testlogs/test/e2e-rust/*/test.outputs/asan-e2e.*
