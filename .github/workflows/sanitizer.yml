# Nightly sanitizer build: ASan + UBSan on unit tests and e2e suite.
# Catches memory errors (buffer overflow, use-after-free, leaks) and
# undefined behavior that functional tests miss.
#
# Runs on schedule (nightly) and on-demand via workflow_dispatch.
# Uses a separate build directory (build-sanitized/) with Clang.

permissions:
  contents: read

on:
  schedule:
    # Run at 03:00 UTC every night (after fuzz at 02:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

name: sanitizer

concurrency:
  group: sanitizer
  cancel-in-progress: false

jobs:
  sanitizer:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    name: asan-ubsan / amd64
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Build with sanitizers (ASan + UBSan)
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c "make nix-build-sanitized"

      - name: Run unit tests under sanitizers
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:log_path=/tmp/asan-unit
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c "cd build-sanitized && ctest --output-on-failure"

      - name: Run e2e tests under sanitizers
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:log_path=/tmp/asan-e2e
        run: |
          nix \
            --extra-experimental-features "nix-command flakes" \
            --option filter-syscalls false \
            develop --command bash -c \
              "cd test/e2e-rust && SIPI_BIN=\$PWD/../../build-sanitized/sipi cargo test -- --test-threads=1"

      - name: Collect sanitizer reports
        if: always()
        run: |
          mkdir -p sanitizer-reports
          # Collect any ASan log files
          for f in /tmp/asan-unit.* /tmp/asan-e2e.*; do
            [ -f "$f" ] && cp "$f" sanitizer-reports/ || true
          done
          # Summary
          if [ -n "$(ls sanitizer-reports/ 2>/dev/null)" ]; then
            echo "## Sanitizer findings" > sanitizer-reports/summary.md
            for f in sanitizer-reports/asan-*; do
              [ -f "$f" ] || continue
              echo "" >> sanitizer-reports/summary.md
              echo "### $(basename "$f")" >> sanitizer-reports/summary.md
              echo '```' >> sanitizer-reports/summary.md
              head -100 "$f" >> sanitizer-reports/summary.md
              echo '```' >> sanitizer-reports/summary.md
            done
            echo "::warning::Sanitizer findings detected — see artifacts"
          else
            echo "No sanitizer findings." > sanitizer-reports/summary.md
            echo "All tests passed cleanly under ASan + UBSan."
          fi

      - name: Upload sanitizer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-reports
          retention-days: 30
          path: sanitizer-reports/
