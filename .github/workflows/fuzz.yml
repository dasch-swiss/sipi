# Nightly / on-demand fuzz testing using libFuzzer (requires Clang).
# Runs the IIIF URI parser fuzzer for a configurable duration.
#
# Corpus persistence: each run downloads the previous night's corpus,
# merges new findings, and uploads the result. This means coverage
# accumulates across runs instead of starting fresh each time.
#
# On crash: uploads reproducer artifacts (retained 90 days) and opens
# a GitHub issue with the crash details so the team gets notified.
#
# Build flow: `just nix-build-fuzz` produces
# `result/bin/iiif_handler_uri_parser_fuzz`. `just nix-run-fuzz` then
# runs it against a live corpus + read-only seed corpus. libFuzzer's
# exit code propagates through the recipe so this job can detect crashes.

permissions:
  contents: read
  issues: write

on:
  schedule:
    # Run at 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration in seconds'
        required: false
        default: '600'

name: fuzz

concurrency:
  group: fuzz
  cancel-in-progress: false

jobs:
  fuzz-iiif-parser:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    name: fuzz / iiif-uri-parser
    steps:
      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}
      - name: Pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: cachix/cachix-action@v15
        with:
          name: dasch-swiss
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: extractions/setup-just@v2

      - name: Find last successful fuzz run
        id: last-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/fuzz.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Restore corpus from previous run
        if: steps.last-run.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: fuzz-corpus
          path: fuzz-corpus-prev
          run-id: ${{ steps.last-run.outputs.run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Build fuzz target
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just nix-build-fuzz

      - name: Prepare live corpus (merge previous-run findings)
        run: |
          mkdir -p fuzz-corpus-live
          if [ -d fuzz-corpus-prev ] && [ -n "$(ls fuzz-corpus-prev 2>/dev/null)" ]; then
            echo "Restoring corpus from previous run..."
            cp fuzz-corpus-prev/* fuzz-corpus-live/ 2>/dev/null || true
            echo "Restored $(ls fuzz-corpus-live | wc -l) inputs from previous run"
          fi

      - name: Run fuzzer
        id: fuzz
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          FUZZ_DURATION: ${{ inputs.duration || '600' }}
        run: |
          set -o pipefail
          if [[ ! "$FUZZ_DURATION" =~ ^[0-9]+$ ]]; then echo "Invalid duration: $FUZZ_DURATION"; exit 1; fi
          # Fuzzer binary from the Nix build is self-contained — no dev shell needed.
          just nix-run-fuzz fuzz-corpus-live "$FUZZ_DURATION" fuzz/handlers/corpus \
            2>&1 | tee fuzz-output.log
          echo "Corpus now has $(ls fuzz-corpus-live | wc -l) inputs"

      - name: Save corpus for next run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus
          retention-days: 30
          overwrite: true
          path: fuzz-corpus-live/

      - name: Collect crash details
        if: failure() && steps.fuzz.outcome == 'failure'
        id: crashes
        run: |
          echo "## Crash files found:" > crash-summary.md
          for f in crash-* oom-* timeout-*; do
            [ -f "$f" ] || continue
            echo "" >> crash-summary.md
            echo "### $f" >> crash-summary.md
            echo '```' >> crash-summary.md
            xxd "$f" | head -20 >> crash-summary.md
            echo '```' >> crash-summary.md
            echo "**As text:** \`$(cat "$f" | tr -cd '[:print:]')\`" >> crash-summary.md
          done
          if [ -f fuzz-output.log ]; then
            echo "" >> crash-summary.md
            echo "### Fuzzer output (last 50 lines)" >> crash-summary.md
            echo '```' >> crash-summary.md
            tail -50 fuzz-output.log >> crash-summary.md
            echo '```' >> crash-summary.md
          fi
          echo "has_crashes=true" >> "$GITHUB_OUTPUT"

      - name: Upload crash artifacts
        if: failure() && steps.fuzz.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          retention-days: 90
          path: |
            crash-*
            oom-*
            timeout-*
            fuzz-output.log

      - name: Open GitHub issue for crash
        if: failure() && steps.crashes.outputs.has_crashes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > /tmp/fuzz-issue-body.md <<ISSUE_EOF
          **Fuzzer found a crash in the IIIF URI parser.**

          **Workflow run:** $RUN_URL
          **Download crash reproducers:** Go to the workflow run → Artifacts → \`fuzz-crashes\`

          ### How to reproduce locally

          \`\`\`bash
          # Download the crash file from the artifact, then:
          just nix-build-fuzz
          ./result/bin/iiif_handler_uri_parser_fuzz /path/to/crash-file
          \`\`\`
          ISSUE_EOF
          cat crash-summary.md >> /tmp/fuzz-issue-body.md
          gh issue create \
            --title "Fuzz: crash in parse_iiif_uri ($(date +%Y-%m-%d))" \
            --label "bug,fuzz" \
            --body-file /tmp/fuzz-issue-body.md
