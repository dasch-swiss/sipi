# Nightly / on-demand fuzz testing using libFuzzer (requires Clang).
# Runs the IIIF URI parser fuzzer for a configurable duration.
#
# Corpus persistence: each run downloads the previous run's corpus, merges
# new findings, and uploads the result. The seed corpus committed at
# fuzz/handlers/corpus/ is the fallback when no prior run is reachable.
#
# On finding: workflow fails. The `fuzz-crashes` artifact (90-day retention)
# contains the reproducer files plus `crash-summary.md` with annotated bytes.
#
# Build flow: `just bazel-build-fuzz` produces
# `bazel-bin/fuzz/handlers/iiif_handler_uri_parser_fuzz` via
# `bazel build --config=fuzz`. `just bazel-run-fuzz` runs the harness
# against a live corpus + read-only seed corpus; `bazel run` resolves
# cwd to `$BUILD_WORKSPACE_DIRECTORY`, so corpus paths and crash-file
# globs (`crash-*` / `oom-*` / `timeout-*`) match the workspace-relative
# paths the artifact-collection steps below expect.

permissions:
  contents: read

# Re-armed under hermetic-llvm (DEV-6563 Phase 13). `--config=fuzz` sets
# `--@llvm//config:{fuzzer,asan}=true`, so the toolchain builds + links the
# compiler-rt libFuzzer + ASan runtimes from source — the missing-runtime
# blocker ADR-0014 carved this gate out for. foreign_cc=0 (ADR-0015) removed
# the global-instrument-breaks-third-party-CMake-deps blocker. Runs on
# linux-x86_64 (darwin sanitizer runtimes are upstream-gapped — see
# docs/adr/0014-toolchain-provider-swap.md "Carved-out instrumentation gates").
on:
  schedule:
    # Run at 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration in seconds'
        required: false
        default: '600'

name: fuzz

concurrency:
  group: fuzz
  cancel-in-progress: false

jobs:
  fuzz-iiif-parser:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    name: fuzz / iiif-uri-parser
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: lfs-
      - name: Pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-experimental-features = configurable-impure-env
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "false"  # GHA cache backend only; FlakeHub requires a paid plan we're not on.

      # Remote cache + executor via the bazel-rbe composite action (NativeLink
      # :50051 + bazel-remote :50052, mTLS — see ci.yml for the topology).
      # amd64-only, so the action's default target-platform
      # (//platforms:linux_x86_64) needs no override.
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          endpoint: ${{ vars.BAZEL_RBE_ENDPOINT }}
          ca-cert: ${{ secrets.BAZEL_RBE_CA_CERT }}
          client-cert: ${{ secrets.BAZEL_RBE_CLIENT_CERT }}
          client-key: ${{ secrets.BAZEL_RBE_CLIENT_KEY }}

      - name: Find last successful fuzz run
        id: last-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/fuzz.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Restore corpus from previous run
        if: steps.last-run.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: fuzz-corpus
          path: fuzz-corpus-prev
          run-id: ${{ steps.last-run.outputs.run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Build fuzz target
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        # `nix develop --command` activates the dev shell so bazelisk + `gh` (the
        # kakadu repository_rule) are on PATH. `--remote_download_toplevel`
        # overrides the .bazelrc BwoB default so the fuzz binary is materialised
        # locally — the separate `bazel run` in "Run fuzzer" (which carries no
        # remote flags) then finds it instead of rebuilding on the runner.
        run: nix develop --command bash -c "just bazel-build-fuzz ${{ steps.rbe.outputs.flags }} --remote_download_toplevel"

      - name: Prepare live corpus (merge previous-run findings)
        run: |
          mkdir -p fuzz-corpus-live
          if [ -d fuzz-corpus-prev ] && [ -n "$(ls fuzz-corpus-prev 2>/dev/null)" ]; then
            echo "Restoring corpus from previous run..."
            cp fuzz-corpus-prev/* fuzz-corpus-live/ 2>/dev/null || true
            echo "Restored $(ls fuzz-corpus-live | wc -l) inputs from previous run"
          fi

      - name: Run fuzzer
        id: fuzz
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          FUZZ_DURATION: ${{ inputs.duration || '600' }}
        run: |
          set -o pipefail
          if [[ ! "$FUZZ_DURATION" =~ ^[0-9]+$ ]]; then echo "Invalid duration: $FUZZ_DURATION"; exit 1; fi
          # `bazel run` re-uses the disk cache populated by the build step
          # so this invocation only forwards args; no rebuild expected.
          # `nix develop --command` activates the dev shell — same reason
          # the build step needs it. cwd inside the dev shell is the repo
          # root, which `bazel run` resolves to `$BUILD_WORKSPACE_DIRECTORY`,
          # so `fuzz-corpus-live` and `fuzz/handlers/corpus` are workspace-
          # relative.
          nix develop --command bash -c "just bazel-run-fuzz fuzz-corpus-live $FUZZ_DURATION fuzz/handlers/corpus" \
            2>&1 | tee fuzz-output.log
          echo "Corpus now has $(ls fuzz-corpus-live | wc -l) inputs"

      - name: Save corpus for next run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus
          retention-days: 30
          overwrite: true
          path: fuzz-corpus-live/

      - name: Collect crash details
        if: failure() && steps.fuzz.outcome == 'failure'
        run: |
          echo "## Crash files found:" > crash-summary.md
          for f in crash-* oom-* timeout-*; do
            [ -f "$f" ] || continue
            echo "" >> crash-summary.md
            echo "### $f" >> crash-summary.md
            echo '```' >> crash-summary.md
            xxd "$f" | head -20 >> crash-summary.md
            echo '```' >> crash-summary.md
            echo "**As text:** \`$(cat "$f" | tr -cd '[:print:]')\`" >> crash-summary.md
          done
          if [ -f fuzz-output.log ]; then
            echo "" >> crash-summary.md
            echo "### Fuzzer output (last 50 lines)" >> crash-summary.md
            echo '```' >> crash-summary.md
            tail -50 fuzz-output.log >> crash-summary.md
            echo '```' >> crash-summary.md
          fi

      - name: Upload crash artifacts
        if: failure() && steps.fuzz.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          retention-days: 90
          path: |
            crash-*
            oom-*
            timeout-*
            fuzz-output.log
            crash-summary.md
