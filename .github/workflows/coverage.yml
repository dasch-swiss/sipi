# Post-merge coverage workflow.
#
# Runs `just bazel-coverage` on a single linux-amd64 runner whenever
# `main` advances (i.e. on every PR merge) and uploads the combined
# lcov report to Codecov. Split out from `ci.yml` so PR CI stays fast
# (skips instrumentation overhead, 1.5-2x compile + slower test
# runtime, and Codecov network latency on every push).
#
# Trade-off: PRs no longer surface a Codecov coverage delta in the
# review UI; coverage drift is detected on each merge to main instead.
# If we ever want per-PR coverage signal back, scope it to PRs that
# touch `src/` in a separate workflow.
#
# `bazel-coverage`'s `llvm-profdata`/`llvm-cov` needs (COVERAGE_GCOV_PATH,
# LLVM_COV) resolve from the hermetic-toolchain aliases
# `//bazel:llvm-profdata`/`//bazel:llvm-cov` (see justfile ~lines 84-105) —
# no host LLVM install required.

name: coverage

# Post-merge `push: branches: [main]` trigger disabled under the hermetic-llvm
# toolchain: its `llvm_coverage_map_format` feature does not activate (gated on
# the unmerged rules_cc PR #385), so `bazel coverage` produces an empty lcov
# (no DA records). Kept as a manual (workflow_dispatch) target. See
# docs/adr/0014-toolchain-provider-swap.md ("Carved-out instrumentation
# gates"). Restore the `push:` block below once coverage instrumentation works.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-24.04
    name: coverage / linux-amd64
    timeout-minutes: 90
    concurrency:
      group: ${{ github.workflow }}-${{ github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Set up CI environment
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          lfs: "true"
          rbe-runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          rbe-ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          rbe-client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          rbe-client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
      # Authenticated Docker Hub pulls (rate-limit avoidance) for any
      # base image the build may need. Skipped if secrets missing
      # (e.g. manually dispatched fork).
      - uses: docker/login-action@v4
        if: ${{ env.DOCKER_HUB_TOKEN != '' }}
        env:
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build + run all tests under coverage
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
        run: just bazel-coverage ${{ steps.setup.outputs.flags }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: dasch-swiss/sipi
          files: bazel-out/_coverage/_coverage_report.dat
