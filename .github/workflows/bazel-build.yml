name: bazel-build

# Bazel build validation. PR Y (DEV-6342) deliberately keeps CI's normal
# merge-gating green path on Nix; this workflow exercises the
# build-completeness invariant ("every variant builds on macOS-aarch64,
# linux-x86_64, linux-aarch64") for any PR that touches Bazel files.
#
# Two trigger paths:
#  * `pull_request` — runs automatically on PRs that modify Bazel
#    inputs. Same-repo PRs (the only flavour we expect for this branch)
#    use the workflow definition from the PR's HEAD commit, so this
#    works before the workflow file lands on `main`. The `paths` filter
#    keeps unrelated PRs (docs / Python / runtime-Lua / Nix-only changes)
#    out of the dispatch matrix while covering every tree Bazel actually
#    reads: Bazel meta files, the C++ source / header / test trees that
#    feed `//src:sipi_lib`, `//include:headers`, `//shttps:shttps`, and
#    `//test/...` via globs, plus `config/*.lua` (consumed as runfiles
#    by `//test/unit/configuration`).
#  * `workflow_dispatch` — manual trigger via the Actions tab once the
#    workflow file is on `main`. Useful for re-running against a PR
#    branch that hasn't moved.
#
# Subsequent PRs in the migration (DEV-6343 onwards) gradually move
# merge-gating to Bazel; this workflow is replaced in DEV-6348 (Y+6) once
# `ci.yml` invokes Bazel directly.

on:
  pull_request:
    paths:
      # Bazel meta + first-party rule code
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
      - ".bazelignore"
      - "BUILD.bazel"
      - "**/BUILD.bazel"
      - "bazel/**"
      - "platforms/**"
      - "patches/**"
      - "tools/workspace_status.sh"
      - ".github/workflows/bazel-build.yml"
      # Nix dev-shell that the build runs inside
      - "flake.nix"
      - "flake.lock"
      # C++ trees that Bazel pulls in via globs. `ext/**` is intentionally
      # NOT here: each `ext/<lib>/BUILD.bazel` references upstream sources
      # via `http_archive` (sources live in Bazel's repository cache, not
      # the working tree) so only the BUILD files matter, and those are
      # already covered by `**/BUILD.bazel`.
      - "src/**"
      - "include/**"
      - "shttps/**"
      - "test/**"
      - "fuzz/**"
      # Lua configs consumed as test runfiles (e.g.
      # //test/unit/configuration parses sipi.config.lua). Scoped to top-
      # level *.lua to leave config/scripts/** — the runtime Lua handler
      # tree, not a Bazel input — out of the dispatch matrix.
      - "config/*.lua"
  workflow_dispatch:
    inputs:
      bazel_target:
        description: "Bazel target to build (default //src:sipi)"
        required: false
        default: "//src:sipi"
        type: string

permissions:
  contents: read

jobs:
  bazel-build:
    runs-on: ${{ matrix.runs-on }}
    name: bazel build / ${{ matrix.arch }}
    permissions:
      contents: read
    concurrency:
      group: bazel-build-${{ matrix.arch }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-x86_64
            runs-on: ubuntu-24.04
          - arch: linux-aarch64
            runs-on: ubuntu-24.04-arm
          - arch: darwin-aarch64
            runs-on: macos-14

    steps:
      # GitHub-hosted ubuntu-24.04 runners ship ~14 GB of free disk
      # space, ~6 GB of which is consumed by pre-installed SDKs the
      # Bazel build doesn't touch (Android, .NET, Haskell, Boost…).
      # The LLVM 19.1.7 toolchain alone extracts to ~3 GB; piling the
      # 22 ext libs + sysroot + cache directory on top blows past the
      # quota and kills the build with `No space left on device`.
      # The "free disk space" action removes the unused SDKs before
      # Bazel runs. macOS runners have plenty of headroom and skip
      # this step.
      - name: free disk space (linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dasch-swiss/sipi/.github/actions/checkout@main
        with:
          DASCHBOT_PAT: ${{ secrets.DASCHBOT_PAT }}

      - name: pull LFS objects
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout

      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          # Kakadu FOD's `gh release download` flow needs configurable-impure-env
          # to accept GH_TOKEN from the client. The Bazel-side
          # `kakadu_archive` repository_rule reads GH_TOKEN/GITHUB_TOKEN
          # from the env directly and does not depend on this knob.
          extra-conf: |
            extra-experimental-features = configurable-impure-env

      # CACHE STRATEGY (DEV-6371):
      #
      # The disk-cache is managed by `actions/cache@v4` directly rather than
      # through `setup-bazel`'s built-in disk-cache wiring. Two failure modes
      # in the previous setup made this necessary:
      #
      #   1. 0-byte poisoning. setup-bazel <=0.17 saves the disk-cache from
      #      its post-step unconditionally — a bazel build that failed during
      #      analysis (e.g. a transient `http_archive` 415 from zlib.net)
      #      would write an empty `~/.cache/bazel-disk` to GHA under the
      #      input-content-derived cache key. GHA cache keys are immutable,
      #      so every subsequent run hashing to the same inputs restored
      #      0 bytes and re-built kakadu/openssl from source (~12 min on
      #      linux-x86_64). setup-bazel 0.18+ added a `cache-save` input,
      #      but it accepts only static `true|false` — `${{ success() }}`
      #      is captured at step-init when the build hasn't run yet.
      #      `actions/cache@v4` saves only on job success by default.
      #
      #   2. Cache-key churn from incidental edits. The previous key hashed
      #      `flake.nix` (carries comments and docs) and `**/BUILD.bazel`
      #      (sweeps in app-level test/ + src/ BUILD files that don't affect
      #      ext/ action keys). Replaced with the targeted minimum below.
      #      `flake.lock` is what actually pins the dev-shell store paths
      #      consumed via `--action_env=PATH/NIX_LDFLAGS/ACLOCAL_PATH`.
      #
      # Note: foreign_cc actions for kakadu/openssl still rebuild on every
      # `flake.lock` advance because `--action_env=PATH` embeds /nix/store
      # hashes that vary across nixpkgs versions (`.bazelrc:30,42,54`). That
      # is tracked as DEV-6371 tier 2 (action-env hygiene); tier 1 here only
      # fixes the GHA-cache-side poisoning + key churn.
      - uses: actions/cache@v4
        id: bazel-disk-cache
        with:
          path: ~/.cache/bazel-disk
          # Inputs that genuinely affect a foreign_cc action's cache key:
          # MODULE.bazel{,.lock} pin all third-party deps; root + ext/ + bazel/
          # + patches/ + platforms/ shape the rule graph + kakadu Makefile
          # patches; .bazelrc / .bazelversion shape the build engine and
          # action env; flake.lock pins the dev-shell store paths.
          # NOT in the key: src/**, include/**, shttps/**, test/**, fuzz/**,
          # tools/**, config/** — app/test code does not change ext/ action
          # outputs, so changes there should not evict the foreign_cc cache.
          key: bazel-disk-${{ matrix.arch }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'ext/**/BUILD.bazel', 'bazel/**', 'patches/**', 'platforms/**', '.bazelrc', '.bazelversion', 'flake.lock') }}
          # Fallback: when the primary key bumps, restore the most recent
          # prior cache for this arch. Bazel's --disk_cache only consumes
          # action entries whose action key still matches, so a few extra
          # MB of stale entries is harmless and amortises the cost of
          # genuine input changes (e.g. a kakadu version bump).
          restore-keys: |
            bazel-disk-${{ matrix.arch }}-

      # `setup-bazel` continues to manage bazelisk + repository-cache (the
      # `--repository_cache` for http_archive downloads, e.g. the openssl
      # tarball or the Chromium debian sysroot — these are content-addressed
      # by sha256 and have no poisoning risk). disk-cache is disabled here
      # so the action above is the single owner. `--incompatible_strict_action_env`
      # is set in `.bazelrc` so it applies to every invocation.
      #
      # 0.19.0 (was 0.15.0) carries `post-if: !cancelled()` which together
      # with the explicit `actions/cache@v4` above eliminates the
      # cancellation-and-failure save paths that produced 0-byte entries.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: false
          repository-cache: true
          # Inject the --disk_cache flag pointing at the path managed by
          # actions/cache@v4 above. setup-bazel writes `bazelrc` content
          # to a user .bazelrc; Bazel expands $HOME at flag-parse time.
          bazelrc: |
            common --disk_cache=$HOME/.cache/bazel-disk

      - name: bazel build ${{ inputs.bazel_target || '//src:sipi' }}
        env:
          # Same secret the Nix FOD consumes (`flake.nix:24`) — feeds the
          # `kakadu_archive` repository_rule via `gh release download`.
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          # `pull_request` events don't carry `inputs.bazel_target`;
          # default to `//src:sipi` to match the workflow_dispatch default.
          BAZEL_TARGET: ${{ inputs.bazel_target || '//src:sipi' }}
        run: |
          # Bazelisk reads `.bazelversion` and downloads the matching Bazel.
          # Run inside the dev shell so `gh`, `perl`, `cmake`, `pkg-config`,
          # `cacert`, autoconf/automake/libtool/m4 are on PATH — the
          # `kakadu_archive` repository_rule needs `gh`, foreign_cc rules
          # need cmake / perl / pkg-config / autotools.
          #
          # `--verbose_failures` prints failed action command lines.
          # `--sandbox_debug` keeps the sandbox tree on failure and prints
          # its location — needed because rules_foreign_cc captures the
          # underlying Make stderr into a per-action `Make.log` file inside
          # the sandbox; without `--sandbox_debug` the sandbox is wiped on
          # action failure and the Make.log is lost. Removable once kakadu
          # builds reliably across all three platforms.
          nix develop --command bash -c "
            bazelisk build --verbose_failures --sandbox_debug $BAZEL_TARGET
          "

      # On any bazel failure, locate and dump every foreign_cc Make.log
      # under the bazel output base. rules_foreign_cc writes the captured
      # stderr/stdout of each `make()` action into a `Make.log` file
      # alongside the action's output tree; with `--sandbox_debug` above,
      # those survive the action failure. This converts "output X was not
      # created" diagnostics (which omit the actual error) into the real
      # underlying Make stderr.
      - name: dump foreign_cc Make.log files on failure
        if: failure()
        run: |
          set +e
          echo "=== searching for foreign_cc *.log files ==="
          # bazel output base lives under ~/.bazel on these runners; also
          # search the workspace as a fallback for non-default layouts.
          find "$HOME/.bazel" /home/runner/work /Users/runner/work -type f \
            \( -name "Make.log" -o -name "configure.log" -o -name "build.log" -o -name "CMake.log" \) \
            -print 2>/dev/null | while read -r f; do
            echo
            echo "===== $f ====="
            cat "$f"
          done
          echo
          echo "=== end of foreign_cc log dump ==="

      - name: bazel-bin/src/sipi --version
        if: ${{ (inputs.bazel_target || '//src:sipi') == '//src:sipi' }}
        run: |
          nix develop --command bash -c '
            ./bazel-bin/src/sipi --help | head -5
          '
