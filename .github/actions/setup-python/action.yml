name: "Setup python and install libraries"
description: "Setup python and install libraries"

inputs:
  version:
    description: "Python version to install"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.version }}
        cache: pip
