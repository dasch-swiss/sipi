name: "Checkout"
description: "Checkout code, LFS objects, and ci-assets"
inputs:
  DASCHBOT_PAT:
    description: "daschbot's private access token"
    required: true

runs:
  using: "composite"
  steps:
    - name: checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: false  # don't auto-pull LFS — use cache instead
    - name: restore LFS cache
      uses: actions/cache@v4
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('.gitattributes') }}-${{ hashFiles('vendor/**') }}
        restore-keys: lfs-
    - name: pull LFS objects
      shell: bash
      run: git lfs pull
    - name: checkout private ci-assets
      uses: actions/checkout@v4
      with:
        repository: dasch-swiss/dsp-ci-assets
        token: ${{ inputs.DASCHBOT_PAT }}
        path: ci
    - name: copy ci-assets
      shell: bash
      run: cp $GITHUB_WORKSPACE/ci/kakadu/{v8_4_1-01382N,v8_5-01382N}.zip $GITHUB_WORKSPACE/vendor/
