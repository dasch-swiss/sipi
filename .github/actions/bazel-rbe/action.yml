name: bazel-rbe
description: >
  Set up mTLS material for the self-hosted RBE backend and emit the Bazel flag
  string: remote cache + executor (the runner endpoint). Tests are forced
  local (--strategy=TestRunner=local) so compiles cross-compile on the x86_64
  worker while target-arch test binaries run on the native runner. No
  --experimental_remote_downloader: Bazel fetches a FetchBlob digest's bytes
  from the --remote_cache CAS (GrpcRemoteDownloader.java), so a gRPC
  downloader is only usable when it shares a CAS with the remote cache.
  External archives are cached client-side via --repository_cache (.bazelrc)
  + the actions/cache step in each workflow.

inputs:
  runner-endpoint:
    description: RE-API endpoint, e.g. grpcs://<host>:50051 — serves the remote cache (AC+CAS) and the remote executor.
    required: true
  ca-cert:
    description: NativeLink server CA (PEM). Bazel verifies both services' server certs against it.
    required: true
  client-cert:
    description: mTLS client cert (PEM) — the CI identity.
    required: true
  client-key:
    description: mTLS client key (PEM).
    required: true
  target-platform:
    description: "Bazel target platform for this runner (e.g. //platforms:linux_aarch64). Compiles cross-build for it on the x86_64 worker; tests run locally on the runner."
    default: "//platforms:linux_x86_64"

outputs:
  flags:
    description: Bazel flag string to pass to a `just bazel-*` recipe. Empty when mTLS material is absent (fork PR → cold build).
    value: ${{ steps.build.outputs.flags }}

runs:
  using: composite
  steps:
    - id: build
      shell: bash
      env:
        RBE_RUNNER_ENDPOINT: ${{ inputs.runner-endpoint }}
        RBE_CA_CERT: ${{ inputs.ca-cert }}
        RBE_CLIENT_CERT: ${{ inputs.client-cert }}
        RBE_CLIENT_KEY: ${{ inputs.client-key }}
        RBE_TARGET_PLATFORM: ${{ inputs.target-platform }}
      run: |
        set -euo pipefail
        # Fork PRs / missing secrets → emit empty flags so the build runs cold
        # (same gating idiom the workflow uses for docker/login-action).
        if [ -z "${RBE_RUNNER_ENDPOINT:-}" ] || [ -z "${RBE_CLIENT_KEY:-}" ]; then
          echo "bazel-rbe: endpoint/mTLS material absent (fork PR?) — cold build." >&2
          echo "flags=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Cert material lives OUTSIDE the checkout so it can never be picked up as
        # a Bazel action input/output.
        CERT_DIR="$RUNNER_TEMP/.nl"
        mkdir -p "$CERT_DIR"
        printf '%s' "$RBE_CA_CERT"     > "$CERT_DIR/ca.crt"
        printf '%s' "$RBE_CLIENT_CERT" > "$CERT_DIR/client.crt"
        printf '%s' "$RBE_CLIENT_KEY"  > "$CERT_DIR/client.key"
        chmod 600 "$CERT_DIR/client.key"
        FLAGS="--remote_cache=$RBE_RUNNER_ENDPOINT --remote_instance_name=main"
        FLAGS="$FLAGS --tls_certificate=$CERT_DIR/ca.crt --tls_client_certificate=$CERT_DIR/client.crt --tls_client_key=$CERT_DIR/client.key"
        FLAGS="$FLAGS --noremote_cache_compression --remote_upload_local_results=true --experimental_remote_cache_eviction_retries=5"
        # Client fan-out: how many actions each leg keeps in flight to the worker.
        # Bazel's default is the runner's core count (~4), far too low for remote
        # execution where actions run on the worker, not locally — it starves the
        # backend. Validated at 128 on a cold build (2026-07-18): legs pinned at
        # their jobs cap while the backend's scheduler queue stayed at 0 and the
        # host had CPU headroom — i.e. --jobs was the binding constraint, not the
        # backend (8 workers x 64 = 512 slots). 192 makes peak 3-leg demand 576,
        # deliberately slightly over the slot count: a TRANSIENT queue at
        # simultaneous peaks is what the scheduler queue is for; the operator
        # alert is on PERSISTENT queueing (see infra docs/.../native-link/
        # operations.md). Retune alongside nativelink_worker_count as more
        # repositories onboard.
        FLAGS="$FLAGS --jobs=192"
        # Cross-compile on the x86_64 worker, run tests on the native runner:
        #   --extra_execution_platforms pins the EXEC platform to the worker (x86_64) so
        #     exec-config build tools resolve to x86_64, not the runner's arch (that
        #     mismatch ships an arm64/darwin tool to the x86_64 worker → it can't run).
        #   --platforms sets the TARGET arch this runner builds for.
        #   --strategy=TestRunner=local runs the cross-built test binary on the runner.
        FLAGS="$FLAGS --remote_executor=$RBE_RUNNER_ENDPOINT --remote_default_exec_properties=cpu_arch=x86_64"
        # Exec platforms: the x86_64 worker FIRST (compiles/exec tools prefer it), plus
        # the target platform so Bazel's test toolchain can resolve an exec platform
        # matching the target arch and run tests on the native runner. For cross legs the
        # target arch's exec toolchains don't match x86_64-only rules, so compiles still
        # land on the worker; only the test toolchain picks the target-arch platform.
        if [ "$RBE_TARGET_PLATFORM" = "//platforms:linux_x86_64" ]; then
          EXEC_PLATFORMS="//platforms:linux_x86_64"
        else
          EXEC_PLATFORMS="//platforms:linux_x86_64,$RBE_TARGET_PLATFORM"
        fi
        FLAGS="$FLAGS --extra_execution_platforms=$EXEC_PLATFORMS --platforms=$RBE_TARGET_PLATFORM"
        FLAGS="$FLAGS --strategy=TestRunner=local"
        if [ "$RBE_TARGET_PLATFORM" != "//platforms:linux_x86_64" ]; then
          # Cross legs (arm64/darwin runner → x86_64 worker): pin the host config to
          # x86_64 so rules_rust exec-config tools (process_wrapper, build scripts,
          # proc-macros) build for the worker, not the local host (rules_rust #327).
          # And disable local fallback — a fallback to the arm64/darwin host would run
          # x86_64 exec tools there and crash. (amd64 keeps .bazelrc's graceful fallback.)
          FLAGS="$FLAGS --host_platform=//platforms:linux_x86_64 --noremote_local_fallback"
        fi
        echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
